<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#111">
  <title>记分器</title>
  <link rel="manifest" href="manifest.json">
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    html, body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      background: #111;
    }

    /* ── 主题变量 ── */
    :root {
      --bg:      #111111;
      --clr-a:   #D95F4B;
      --clr-b:   #4A7FA8;
      --accent:  #0A84FF;
      --accent-text: #ffffff;
      --win-a:   #D95F4B;
      --win-b:   #4A7FA8;
      --home-l:  rgba(217,95,75,.11);
      --home-r:  rgba(74,127,168,.11);
      --safe-top: 0px;
      --safe-right: 0px;
      --safe-bottom: 0px;
      --safe-left: 0px;
    }
    html[data-platform="android"] {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }
    [data-theme="tennis"] {
      --bg:      #0C2020;
      --clr-a:   #1E5C38;
      --clr-b:   #0E3030;
      --accent:  #C8E040;
      --accent-text: #111;
      --win-a:   #194E30;
      --win-b:   #0A2828;
      --home-l:  rgba(30,92,56,.2);
      --home-r:  rgba(14,48,48,.2);
    }
    [data-theme="basketball"] {
      --bg:      #0D1520;
      --clr-a:   #BB5010;
      --clr-b:   #142038;
      --accent:  #F08020;
      --accent-text: #fff;
      --win-a:   #A04010;
      --win-b:   #102030;
      --home-l:  rgba(187,80,16,.2);
      --home-r:  rgba(20,32,56,.2);
    }
    [data-theme="badminton"] {
      --bg:      #0F1F3D;
      --clr-a:   #1A50A8;
      --clr-b:   #0E2A70;
      --accent:  #4A9FFF;
      --accent-text: #fff;
      --win-a:   #163F8A;
      --win-b:   #0A2060;
      --home-l:  rgba(26,80,168,.2);
      --home-r:  rgba(14,42,112,.2);
    }
    [data-theme="flame"] {
      --bg:      #0D1829;
      --clr-a:   #B81818;
      --clr-b:   #0F2050;
      --accent:  #E02828;
      --accent-text: #fff;
      --win-a:   #901010;
      --win-b:   #0D1B40;
      --home-l:  rgba(184,24,24,.2);
      --home-r:  rgba(15,32,80,.2);
    }
    [data-theme="football"] {
      --bg:      #0F1E12;
      --clr-a:   #1D4A22;
      --clr-b:   #152E18;
      --accent:  #C8CC70;
      --accent-text: #111;
      --win-a:   #163A1A;
      --win-b:   #102412;
      --home-l:  rgba(29,74,34,.2);
      --home-r:  rgba(21,46,24,.2);
    }
    [data-theme="neon"] {
      --bg:      #0D1F1F;
      --clr-a:   #0E3838;
      --clr-b:   #0A2828;
      --accent:  #BADC20;
      --accent-text: #111;
      --win-a:   #0A3030;
      --win-b:   #082020;
      --home-l:  rgba(14,56,56,.2);
      --home-r:  rgba(10,40,40,.2);
    }
    [data-theme="aurora"] {
      --bg:      #080E18;
      --clr-a:   #0E5858;
      --clr-b:   #083040;
      --accent:  #20D0C0;
      --accent-text: #111;
      --win-a:   #0A4848;
      --win-b:   #062838;
      --home-l:  rgba(14,88,88,.2);
      --home-r:  rgba(8,48,64,.2);
    }
    [data-theme="violet"] {
      --bg:      #100D1E;
      --clr-a:   #5A1E80;
      --clr-b:   #2A0E50;
      --accent:  #9B50FF;
      --accent-text: #fff;
      --win-a:   #4A1870;
      --win-b:   #220A40;
      --home-l:  rgba(90,30,128,.2);
      --home-r:  rgba(42,14,80,.2);
    }
    [data-theme="rose"] {
      --bg:      #1A0A10;
      --clr-a:   #982040;
      --clr-b:   #5A0E20;
      --accent:  #FF5878;
      --accent-text: #fff;
      --win-a:   #801830;
      --win-b:   #4A0A18;
      --home-l:  rgba(152,32,64,.2);
      --home-r:  rgba(90,14,32,.2);
    }
    [data-theme="gold"] {
      --bg:      #141008;
      --clr-a:   #8A6000;
      --clr-b:   #4A3200;
      --accent:  #F0B820;
      --accent-text: #111;
      --win-a:   #7A5200;
      --win-b:   #3C2800;
      --home-l:  rgba(138,96,0,.2);
      --home-r:  rgba(74,50,0,.2);
    }
    [data-theme="bw"] {
      --bg:      #0A0A0A;
      --clr-a:   #5A5A5A;
      --clr-b:   #1A1A1A;
      --accent:  #E0E0E0;
      --accent-text: #111;
      --win-a:   #484848;
      --win-b:   #141414;
      --home-l:  rgba(90,90,90,.2);
      --home-r:  rgba(26,26,26,.2);
    }

    body {
      background: var(--bg); color: #fff; height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      overscroll-behavior: none;
    }

    /* ── 主题选择器 ──────────────────────── */
    .collapse-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; cursor: pointer;
      background: rgba(255,255,255,.05); border-radius: 12px;
      transition: background .15s;
    }
    .collapse-header:active { background: rgba(255,255,255,.08); }
    .collapse-header-left { font-size: 15px; color: rgba(255,255,255,.8); }
    .collapse-header-right {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: rgba(255,255,255,.35);
    }
    .collapse-chevron {
      font-size: 14px; color: rgba(255,255,255,.3);
      transition: transform .25s ease; display: inline-block;
    }
    .collapse-chevron.open { transform: rotate(90deg); }
    .collapse-body {
      overflow: hidden;
      max-height: 0;
      transition: max-height .3s ease, padding .3s ease, opacity .25s ease;
      opacity: 0;
    }
    .collapse-body.open { opacity: 1; padding-top: 12px; }

    #themeGrid {
      display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px;
    }
    .theme-wrap { display: flex; flex-direction: column; gap: 5px; }
    .theme-card {
      border-radius: 9px; overflow: hidden; cursor: pointer;
      position: relative; aspect-ratio: 1;
      border: 2px solid transparent; transition: border-color .2s, transform .12s;
    }
    .theme-card:active { transform: scale(.92); }
    .theme-card.active { border-color: rgba(255,255,255,.8); }
    .theme-check {
      position: absolute; bottom: 3px; right: 3px;
      width: 14px; height: 14px; border-radius: 50%;
      background: rgba(255,255,255,.9); display: none;
      align-items: center; justify-content: center;
      font-size: 8px; font-weight: 800; color: #111;
    }
    .theme-card.active .theme-check { display: flex; }
    .theme-name {
      text-align: center; font-size: 11px; color: rgba(255,255,255,.45);
      font-weight: 500; line-height: 1;
    }
    .theme-wrap.active-wrap .theme-name { color: rgba(255,255,255,.9); font-weight: 600; }
    /* overflow:hidden 移除——border-radius 本身就会裁剪背景色，
       overflow:hidden 会在角落裁掉 toggle 按钮的可见部分 */
    .settings-card { background: rgba(255,255,255,.05); border-radius: 12px; }
    .settings-row {
      display: flex; align-items: center; justify-content: space-between;
      gap: 14px; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-copy { display: flex; flex-direction: column; gap: 3px; }
    .settings-title { font-size: 15px; color: rgba(255,255,255,.82); }
    .settings-desc { font-size: 12px; color: rgba(255,255,255,.35); }
    .toggle-btn {
      position: relative;
      border: none; width: 62px; height: 30px; padding: 0; border-radius: 999px;
      background: rgba(255,255,255,.18); cursor: pointer; transition: background .18s ease, box-shadow .18s ease;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
      font-size: 0; color: transparent;
    }
    .toggle-btn::after {
      content: '';
      position: absolute; top: 3px; left: 3px;
      width: 24px; height: 24px; border-radius: 50%;
      background: #F7F8FA;
      box-shadow: 0 1px 4px rgba(0,0,0,.18), 0 6px 14px rgba(0,0,0,.08);
      transition: transform .18s ease, background .18s ease;
    }
    .toggle-btn.on { background: #2F8CFF; box-shadow: inset 0 0 0 1px rgba(255,255,255,.04); }
    .toggle-btn.on::after { transform: translateX(32px); background: #FFFFFF; }
    .toggle-btn:active::after { width: 27px; }
    .toggle-btn.on:active::after { transform: translateX(29px); }
    .option-row {
      display: flex; align-items: center; justify-content: space-between;
      gap: 14px; padding: 12px 16px; border-top: 1px solid rgba(255,255,255,.06);
    }
    .option-row[hidden] { display: none; }
    .choice-group { display: flex; align-items: center; gap: 8px; }
    .choice-btn {
      border: none; border-radius: 999px; padding: 7px 12px;
      background: rgba(255,255,255,.08); color: rgba(255,255,255,.55);
      font-size: 12px; font-weight: 700; letter-spacing: .2px; cursor: pointer;
      transition: background .15s ease, color .15s ease, transform .12s ease;
    }
    .choice-btn.active { background: rgba(47,140,255,.22); color: #D9EBFF; }
    .choice-btn:active { transform: scale(.94); }

    /* ── 屏幕切换 ─────────────────────────── */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      min-height: 100%;
      min-height: 100dvh;
      padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
      transition: opacity .25s ease, transform .25s ease;
    }
    .screen.out { opacity: 0; pointer-events: none; transform: scale(.97); }
    .screen.slide-left  { transform: translateX(-100%); opacity: 0; pointer-events: none; }
    .screen.slide-right { transform: translateX(100%);  opacity: 0; pointer-events: none; }

    /* ══════════════════════════════
       首页
    ══════════════════════════════ */
    #homeScreen {
      align-items: center; justify-content: center; gap: 0;
      background-color: var(--bg);
      background-image: linear-gradient(to right, var(--clr-a) 50%, var(--clr-b) 50%);
      padding: calc(var(--safe-top) + 18px) 18px calc(var(--safe-bottom) + 24px);
    }
    #homeSettingsBtn {
      width: 260px; border: none;
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.45); border-radius: 14px;
      padding: 15px; font-size: 16px; font-weight: 600;
      cursor: pointer; margin-bottom: 12px; text-align: center;
      transition: opacity .15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    #homeSettingsBtn:active { opacity: .6; }
    .home-settings-ico { font-size: 24px; line-height: 1; opacity: .9; }
    .home-settings-label { line-height: 1; }
    #homeLogo {
      font-size: 42px; font-weight: 800; letter-spacing: -1px;
      margin-bottom: 6px;
    }
    #homeSub {
      font-size: 13px; color: rgba(255,255,255,.35);
      letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 52px;
    }
    .home-btn {
      width: 260px; border: none; border-radius: 14px;
      padding: 15px; font-size: 16px; font-weight: 600;
      cursor: pointer; margin-bottom: 12px; text-align: center;
      transition: opacity .15s;
    }
    .home-btn:active { opacity: .7; }
    .home-btn.primary { background: rgba(255,255,255,.94); color: #171717; box-shadow: 0 10px 28px rgba(0,0,0,.18); }
    .home-btn.ghost   { background: rgba(255,255,255,.08); color: rgba(255,255,255,.7); }

    /* ══════════════════════════════
       设置页
    ══════════════════════════════ */
    #setupScreen { background: var(--bg); }
    .back-bar {
      flex-shrink: 0;
      width: 100%;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 0 16px 8px;
      box-sizing: border-box;
    }
    .back-btn {
      border: none; background: none; color: var(--accent);
      font-size: 15px; cursor: pointer; padding: 4px 0;
      display: flex; align-items: center; gap: 4px;
    }
    .back-btn:active { opacity: .6; }
    #setupControls {
      flex: 1; background: var(--bg); overflow-y: auto;
      padding: 8px 18px 28px; display: flex; flex-direction: column; gap: 11px;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      touch-action: pan-y;
    }
    #setupControls::-webkit-scrollbar { display: none; }
    /* 队名卡片输入行 */
    #teamsCard { background: rgba(255,255,255,.05); border-radius: 12px; overflow: hidden; }
    .team-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .team-row:last-child { border-bottom: none; }
    .team-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .team-dot.a { background: var(--clr-a); }
    .team-dot.b { background: var(--clr-b); }
    .team-label { font-size: 15px; color: rgba(255,255,255,.8); min-width: 44px; }
    .team-input {
      flex: 1; background: none; border: none; outline: none;
      color: #fff; font-size: 15px; font-weight: 600;
      text-align: right; caret-color: #fff;
      user-select: text; padding-right: 4px;
    }
    .team-input::placeholder { color: rgba(255,255,255,.2); font-weight: 400; }
    #sportSeg {
      display: flex; justify-content: space-around;
      padding: 4px 0;
    }
    .s-pill {
      flex: 1; border: none; background: none;
      color: rgba(255,255,255,.35); border-radius: 0;
      padding: 0; font-size: 11px; font-weight: 500;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; gap: 7px;
      transition: color .15s, opacity .15s;
    }
    .s-pill.active { color: #fff; }
    .s-pill.active .s-icon { box-shadow: 0 4px 12px rgba(0,0,0,.35); }
    .s-icon {
      width: 56px; height: 56px; border-radius: 13px;
      overflow: hidden; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: transform .15s;
    }
    .s-pill:active .s-icon { transform: scale(.92); }
    .s-pill:not(.active) .s-icon { opacity: .55; }
    .s-icon img {
      width: 100%; height: 100%; object-fit: cover;
      mix-blend-mode: multiply;
    }
    #rulesCard { background: rgba(255,255,255,.05); border-radius: 12px; overflow: hidden; }
    .rule-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .rule-row:last-child { border-bottom: none; }
    .rule-name { font-size: 15px; color: rgba(255,255,255,.8); }
    .stepper { display: flex; align-items: center; gap: 14px; }
    .step-btn {
      border: none; background: rgba(255,255,255,.08); color: rgba(255,255,255,.7);
      width: 28px; height: 28px; border-radius: 50%; font-size: 17px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .step-btn:active { background: rgba(255,255,255,.2); }
    .step-val {
      width: 54px; border: none; background: none; outline: none;
      font-size: 17px; font-weight: 700; color: #fff; text-align: center;
      font-variant-numeric: tabular-nums; user-select: text;
    }
    .step-val::-webkit-outer-spin-button,
    .step-val::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .step-val[type="number"] { -moz-appearance: textfield; appearance: textfield; }
    #startBtn {
      border: none; background: var(--accent); color: var(--accent-text);
      border-radius: 12px; padding: 13px; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: opacity .15s;
    }
    #startBtn:active { opacity: .75; }

    /* ══════════════════════════════
       比赛页
    ══════════════════════════════ */
    /* 记分页面面板铺满全屏，status pill / menu btn 已自带 safe-area 偏移 */
    #gameScreen { background: var(--bg); padding: 0; }
    #arena { flex: 1; display: flex; min-height: 0; }
    .game-paused .panel { filter: brightness(.55) saturate(.6); pointer-events: none; }
    .game-paused .bb-btn { pointer-events: none; }
    .panel {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; position: relative;
      transition: filter .2s, opacity .2s;
      overflow: hidden;        /* 涟漪裁剪 */
      min-height: 0;
      /* 上下留出状态栏 / 导航栏空间 */
      padding: calc(var(--safe-top) + clamp(28px, 5vh, 60px)) 0
               calc(var(--safe-bottom) + clamp(62px, 10vh, 112px));
    }
    .panel:active { filter: brightness(.84); }

    /* 触点涟漪 */
    .score-ripple {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,.22);
      width: 20px; height: 20px;
      transform: translate(-50%,-50%) scale(0);
      animation: score-ripple .52s cubic-bezier(.22,.61,.36,1) forwards;
      pointer-events: none;
    }
    @keyframes score-ripple {
      0%   { transform: translate(-50%,-50%) scale(0); opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(28); opacity: 0; }
    }
    #panelA { background: var(--clr-a); } #panelB { background: var(--clr-b); }
    .serve-pip {
      width: 7px; height: 7px; border-radius: 50%;
      background: #FFD60A; margin-top: 5px; flex-shrink: 0;
      opacity: 0; transition: opacity .25s;
    }
    .serve-pip.on { opacity: 1; }
    .p-name { font-size: clamp(14px, 2.4vh, 20px); font-weight: 700; letter-spacing: .4px; opacity: .7; }
    .p-score {
      font-size: min(40vw, 24vh, 210px);
      font-weight: 800;
      line-height: .9;
      letter-spacing: -4px;
      margin-top: 2px;
      font-variant-numeric: tabular-nums;
    }
    .p-sub { min-height: 24px; font-size: clamp(15px, 2.8vh, 25px); font-weight: 700; opacity: .6; margin-top: 6px; }
    .p-sets { margin-top: 10px; font-size: 11px; letter-spacing: 4px; opacity: .4; min-height: 14px; }
    .bb-row {
      display: none;
      width: min(420px, 92%);
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 20px;
      padding: 0;
    }
    .bb-btn {
      border: none; background: rgba(255,255,255,.16); color: #fff;
      min-width: 0;
      border-radius: 22px; min-height: 78px; padding: 0;
      font-size: clamp(30px, 5.4vh, 40px); font-weight: 800; letter-spacing: -1px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .1s, transform .1s;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
    }
    .bb-btn:active { background: rgba(255,255,255,.32); transform: scale(.91); }
    #statusPill {
      position: fixed; top: calc(var(--safe-top) + 10px); left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.45); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      color: rgba(255,255,255,.6); font-size: 11px; font-weight: 600; letter-spacing: .4px;
      padding: 4px 10px; border-radius: 20px;
      pointer-events: none; white-space: nowrap; z-index: 10;
    }
    #menuBtn {
      position: fixed; bottom: calc(var(--safe-bottom) + 16px); left: 50%; transform: translateX(-50%); z-index: 20;
      min-width: 68px; height: 40px; border-radius: 999px; border: none;
      padding: 0 14px;
      background: rgba(0,0,0,.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      color: rgba(255,255,255,.82); font-size: 13px; font-weight: 700; letter-spacing: .4px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .15s, min-width .15s;
      font-variant-numeric: tabular-nums;
    }
    #menuBtn:active { background: rgba(0,0,0,.7); transform: translateX(-50%) scale(.92); }
    #menuBtn.paused { color: rgba(255,255,255,.95); background: rgba(0,0,0,.58); }

    /* 弹出菜单 */
    #menuBackdrop { position: fixed; inset: 0; z-index: 25; display: none; }
    #menuBackdrop.open { display: block; }
    #deleteBackdrop { position: fixed; inset: 0; z-index: 25; display: none; }
    #deleteBackdrop.open { display: block; }
    #deleteSheet {
      position: fixed; inset: 0; z-index: 30;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
      padding: 16px 16px calc(var(--safe-bottom) + 20px);
      pointer-events: none; opacity: 0; transform: translateY(16px);
      transition: opacity .2s, transform .2s;
    }
    #deleteSheet.open { pointer-events: all; opacity: 1; transform: translateY(0); }
    #menuSheet {
      position: fixed; inset: 0; z-index: 30;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
      padding: 16px 16px calc(var(--safe-bottom) + 20px);
      pointer-events: none; opacity: 0; transform: translateY(16px);
      transition: opacity .2s, transform .2s;
    }
    #menuSheet.open { pointer-events: all; opacity: 1; transform: translateY(0); }
    .menu-card {
      background: rgba(28,28,30,.96); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-radius: 16px; overflow: auto; width: min(260px, 80vw); margin-bottom: 10px;
      max-height: min(58vh, 420px);
      -webkit-overflow-scrolling: touch;
    }
    .menu-item {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 18px; font-size: 15px; font-weight: 500; color: #fff;
      cursor: pointer; border: none; background: none; width: 100%; text-align: left;
      border-bottom: 1px solid rgba(255,255,255,.07); transition: background .1s;
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item:active { background: rgba(255,255,255,.08); }
    .menu-item.danger { color: #FF6868; }
    .menu-item .ico { font-size: 15px; width: 20px; text-align: center; opacity: .7; }
    .menu-cancel {
      background: rgba(28,28,30,.96); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-radius: 14px; border: none; color: rgba(255,255,255,.65);
      font-size: 16px; font-weight: 600; width: min(260px, 80vw); padding: 14px; cursor: pointer;
    }
    .menu-cancel:active { opacity: .6; }

    /* 胜利遮罩 */
    #overlay {
      position: fixed; inset: 0; z-index: 50;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0;
      transition: background .35s ease;
    }
    #overlay[hidden] { display: none; }
    #winName { font-size: clamp(44px, 9vw, 72px); font-weight: 800; letter-spacing: -1px; color: #fff; line-height: 1; }
    #winLabel { font-size: clamp(16px, 3vw, 22px); font-weight: 500; color: rgba(255,255,255,.6); margin-top: 8px; letter-spacing: 3px; }
    #winScore { font-size: 14px; color: rgba(255,255,255,.45); letter-spacing: 3px; margin-top: 14px; }
    .ov-divider { width: 40px; height: 1px; background: rgba(255,255,255,.25); margin: 28px 0; }
    .ov-btns { display: flex; flex-direction: column; gap: 10px; align-items: center; }
    .ov-btn { border: none; border-radius: 14px; padding: 13px 0; font-size: 16px; font-weight: 600; cursor: pointer; width: 220px; text-align: center; }
    .ov-btn:active { opacity: .7; }
    .ov-primary   { background: rgba(255,255,255,.95); color: #111; }
    .ov-secondary { background: rgba(255,255,255,.12); color: rgba(255,255,255,.75); }

    /* ══════════════════════════════
       历史列表
    ══════════════════════════════ */
    #historyScreen { background: var(--bg); }
    #historyList {
      flex: 1; overflow-y: auto; padding: 8px 12px 24px;
      display: flex; flex-direction: column; gap: 10px;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      touch-action: pan-y;
    }
    #historyList::-webkit-scrollbar { display: none; }
    .h-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 40px 32px; text-align: center; }
    .h-empty-icon { font-size: 48px; opacity: .35; margin-bottom: 4px; }
    .h-empty-title { font-size: 17px; font-weight: 600; color: rgba(255,255,255,.4); }
    .h-empty-desc { font-size: 13px; color: rgba(255,255,255,.22); line-height: 1.6; }
    .h-card {
      width: 100%;
      min-height: 104px;
      background: rgba(255,255,255,.06); border-radius: 18px;
      padding: 16px 18px 18px; cursor: pointer; transition: background .1s;
      display: flex; flex-direction: column; gap: 8px;
      position: relative;
      box-sizing: border-box;
    }
    .h-card:active { background: rgba(255,255,255,.1); }
    .h-card-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .h-sport { font-size: 12px; color: rgba(255,255,255,.42); font-weight: 600; letter-spacing: 1px; }
    .h-date  { font-size: 12px; color: rgba(255,255,255,.32); flex-shrink: 0; }
    .h-teams {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 12px;
    }
    .h-team {
      font-size: 19px;
      font-weight: 700;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .h-teams .h-team:last-child { text-align: right; }
    .h-team.winner { color: #fff; }
    .h-team.loser  { color: rgba(255,255,255,.4); }
    .h-vs-score {
      font-size: 21px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 1px;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .h-duration { font-size: 12px; color: rgba(255,255,255,.25); text-align: right; margin-top: auto; }
    .h-set-line {
      font-size: 12px;
      color: rgba(255,255,255,.36);
      line-height: 1.45;
      letter-spacing: .2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ══════════════════════════════
       历史详情
    ══════════════════════════════ */
    #detailScreen { background: var(--bg); }
    #detailBody {
      flex: 1; overflow-y: auto; padding: 0 16px 32px;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      touch-action: pan-y;
    }
    #detailBody::-webkit-scrollbar { display: none; }

    /* 详情 - 头部 */
    .d-header { padding: 4px 0 20px; text-align: center; }
    .d-names { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .d-names .d-vs { color: rgba(255,255,255,.3); font-weight: 400; margin: 0 8px; }
    .d-result { font-size: 14px; color: rgba(255,255,255,.4); }

    /* 详情 - 区块通用 */
    .d-section { margin-bottom: 24px; }
    .d-section-title { font-size: 11px; font-weight: 600; color: rgba(255,255,255,.35); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
    .d-card { background: rgba(255,255,255,.05); border-radius: 14px; overflow: hidden; }
    .detail-delete-wrap { padding-top: 6px; }
    .detail-delete-btn {
      width: 100%; border: none; border-radius: 14px;
      padding: 14px 16px; background: rgba(201,59,49,.16); color: #FF8B80;
      font-size: 15px; font-weight: 700; cursor: pointer; transition: background .15s ease, color .15s ease;
    }
    .detail-delete-btn:active { background: rgba(201,59,49,.24); color: #FFD3CF; }

    /* 比分差距图 */
    .chart-wrap { width: 100%; padding: 8px 16px 14px; }
    .chart-wrap svg { width: 100%; display: block; }

    /* 每局比分 */
    .set-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 16px; border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .set-row:last-child { border-bottom: none; }
    .set-label { font-size: 14px; color: rgba(255,255,255,.5); }
    .set-score { font-size: 16px; font-weight: 700; letter-spacing: 2px; }
    .set-time  { font-size: 12px; color: rgba(255,255,255,.3); }
    .set-detail { margin-bottom: 18px; }
    .set-detail:last-child { margin-bottom: 0; }
    .set-detail-card { background: rgba(255,255,255,.05); border-radius: 16px; overflow: hidden; }
    .set-detail-head {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 16px 18px 10px;
    }
    .set-detail-title { font-size: 15px; font-weight: 700; color: #fff; }
    .set-detail-meta { display: flex; align-items: baseline; gap: 12px; }
    .set-detail-score { font-size: 15px; font-weight: 700; color: rgba(255,255,255,.9); letter-spacing: 1px; }
    .set-detail-time { font-size: 12px; color: rgba(255,255,255,.35); }
    .set-detail-rule {
      padding: 0 18px 6px;
      font-size: 12px; color: rgba(255,255,255,.32);
      letter-spacing: .2px;
    }

    /* 亮点：连续得分 */
    .streak-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 16px; border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .streak-item:last-child { border-bottom: none; }
    .streak-who { font-size: 15px; font-weight: 600; }
    .streak-meta { display: flex; align-items: baseline; gap: 10px; }
    .streak-count { font-size: 13px; color: rgba(255,255,255,.4); }
    .streak-time { font-size: 12px; color: rgba(255,255,255,.28); }
    .streak-badge { background: rgba(255,255,255,.1); border-radius: 8px; padding: 3px 10px; font-size: 13px; font-weight: 700; }

    /* 逐分记录 */
    .log-set-header {
      font-size: 12px; color: rgba(255,255,255,.35); font-weight: 600;
      letter-spacing: 1px; padding: 12px 0 6px;
    }
    .log-run {
      display: grid; grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr) auto;
      align-items: baseline; gap: 14px;
      padding: 11px 16px; border-top: 1px solid rgba(255,255,255,.04);
    }
    .log-run:last-child { border-bottom: none; }
    .log-who { font-size: 14px; font-weight: 600; min-width: 0; }
    .log-pts { font-size: 12px; color: rgba(255,255,255,.35); min-width: 0; }
    .log-meta { display: flex; align-items: baseline; justify-content: flex-end; gap: 12px; white-space: nowrap; }
    .log-point-time { font-size: 12px; color: rgba(255,255,255,.32); font-variant-numeric: tabular-nums; }
    .log-score { font-size: 13px; color: rgba(255,255,255,.6); font-variant-numeric: tabular-nums; font-weight: 600; }
    .settings-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px 18px 28px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      touch-action: pan-y;
    }
    .settings-scroll::-webkit-scrollbar { display: none; }

    html[data-platform="desktop"] .screen {
      padding: 0;
    }
    html[data-platform="desktop"] #homeScreen {
      padding: 0;
    }
    html[data-platform="desktop"] .back-bar {
      min-height: 44px;
    }
    html[data-platform="desktop"] .panel {
      padding: 0;
    }
    html[data-platform="desktop"] .p-score {
      font-size: clamp(96px, 25vh, 210px);
      line-height: 1;
    }
    html[data-platform="desktop"] #statusPill {
      top: 10px;
    }
    html[data-platform="desktop"] #menuBtn {
      bottom: 16px;
    }
    html[data-platform="desktop"] #menuSheet {
      inset: auto 0 0 0;
      justify-content: flex-start;
      padding: 0 0 20px;
    }
    html[data-platform="desktop"] .menu-card {
      overflow: hidden;
      width: min(260px, 80vw);
      max-height: none;
    }
    html[data-platform="desktop"] .menu-cancel {
      width: min(260px, 80vw);
    }
    html[data-platform="desktop"] #deleteSheet .menu-card { width: min(260px, 80vw); }
    html[data-platform="desktop"] #deleteSheet .menu-cancel { width: min(260px, 80vw); }
    /* Mac：左侧是红绿灯，所有顶栏按钮靠右 */
    html[data-platform="desktop"] .back-bar {
      justify-content: flex-end;
    }
    html[data-platform="desktop"] .hist-bar {
      justify-content: flex-end;
    }
    /* 平台专属设置行 */
    html[data-platform="desktop"] .android-only { display: none; }
    html[data-platform="android"]  .desktop-only { display: none; }
    html[data-platform="android"] .back-bar {
      min-height: 44px;
      padding: 0 16px 8px;
      justify-content: flex-start;
    }
    html[data-platform="android"] .back-btn {
      display: none;
    }
    html[data-platform="android"].show-back-btn .back-btn {
      display: flex;
    }

    @media (orientation: landscape) and (max-height: 560px) {
      html[data-platform="android"] #homeScreen {
        justify-content: flex-start;
        padding-top: calc(var(--safe-top) + 10px);
      }
      html[data-platform="android"] #homeLogo {
        font-size: clamp(28px, 5.4vw, 58px);
        margin-bottom: 4px;
      }
      html[data-platform="android"] #homeSub {
        margin-bottom: 24px;
        font-size: 11px;
        letter-spacing: 4px;
      }
      html[data-platform="android"] .home-btn,
      html[data-platform="android"] #homeSettingsBtn {
        width: min(360px, 52vw);
        padding: 12px 14px;
        margin-bottom: 10px;
        font-size: 15px;
      }
      html[data-platform="android"] #setupControls,
      html[data-platform="android"] .settings-scroll,
      html[data-platform="android"] #historyList,
      html[data-platform="android"] #detailBody {
        padding-top: 4px;
        padding-bottom: 18px;
        gap: 8px;
      }
      html[data-platform="android"] #setupControls {
        display: grid;
        grid-template-columns: minmax(0, 1.08fr) minmax(0, .92fr);
        align-content: start;
        gap: 10px 12px;
      }
      html[data-platform="android"] #teamsCard {
        grid-column: 1;
        grid-row: 1;
      }
      html[data-platform="android"] #rulesCard {
        grid-column: 1;
        grid-row: 2;
      }
      html[data-platform="android"] #sportSeg {
        grid-column: 2;
        grid-row: 1 / span 2;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px 8px;
        align-items: start;
        padding: 0;
      }
      html[data-platform="android"] #startBtn {
        grid-column: 1 / span 2;
        grid-row: 3;
      }
      html[data-platform="android"] .team-row,
      html[data-platform="android"] .rule-row,
      html[data-platform="android"] .settings-row,
      html[data-platform="android"] .option-row {
        padding-top: 9px;
        padding-bottom: 9px;
      }
      html[data-platform="android"] .s-icon {
        width: 48px;
        height: 48px;
        border-radius: 11px;
      }
      html[data-platform="android"] .s-pill {
        font-size: 10px;
        gap: 6px;
        min-width: 0;
      }
      html[data-platform="android"] .panel {
        padding-top: calc(var(--safe-top) + clamp(16px, 3vh, 36px));
        padding-bottom: calc(var(--safe-bottom) + clamp(48px, 8vh, 80px));
      }
      html[data-platform="android"] #arena {
        align-items: stretch;
      }
      html[data-platform="android"] .p-name {
        font-size: clamp(13px, 2vh, 17px);
      }
      html[data-platform="android"] .p-score {
        font-size: min(22vw, 34vh, 158px);
        margin-top: 0;
      }
      html[data-platform="android"] .p-sub {
        min-height: 20px;
        font-size: clamp(13px, 2.1vh, 19px);
        margin-top: 3px;
      }
      html[data-platform="android"] .p-sets {
        margin-top: 6px;
      }
      html[data-platform="android"] .bb-row {
        width: min(360px, 84%);
        gap: 14px;
        margin-top: 22px;
      }
      html[data-platform="android"] .bb-btn {
        min-height: 88px;
        border-radius: 24px;
        font-size: clamp(32px, 6.2vh, 42px);
      }
      html[data-platform="android"] #statusPill {
        top: calc(var(--safe-top) + 8px);
        font-size: 10px;
      }
      html[data-platform="android"] #menuBtn {
        min-width: 62px;
        height: 36px;
        font-size: 12px;
      }
      html[data-platform="android"] #menuSheet {
        justify-content: center;
        padding-top: calc(var(--safe-top) + 12px);
        padding-bottom: calc(var(--safe-bottom) + 12px);
      }
      html[data-platform="android"] .menu-card {
        width: min(340px, 56vw);
        max-height: min(68vh, 360px);
        margin-bottom: 8px;
      }
      html[data-platform="android"] .menu-item {
        padding: 11px 16px;
        font-size: 14px;
      }
      html[data-platform="android"] .menu-cancel {
        width: min(340px, 56vw);
        padding: 12px;
      }
    }

    /* ── 历史顶栏导出按钮 ── */
    .hist-bar {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      width:100%;
      min-height:44px;
      padding:0 16px 8px;
      flex-shrink:0;
      box-sizing:border-box;
    }
    .hist-export-btn { border:none; background:rgba(255,255,255,.1); color:rgba(255,255,255,.75); border-radius:10px; padding:6px 14px; font-size:13px; font-weight:600; cursor:pointer; }
    .hist-export-btn:active { background:rgba(255,255,255,.2); }

    /* ── 滑动删除（Android）── */
    /* 删除键放在底层，卡片作为上层整块左滑，避免 Android WebView
       在 flex + calc(100% - x) 组合下出现高度/宽度塌陷。 */
    .h-swipe-item {
      position:relative;
      overflow:hidden;
      width:100%;
      min-height:104px;
      align-self:stretch;
      display:block;
      border-radius:18px;
      margin-bottom:10px;
      box-sizing:border-box;
    }
    .h-swipe-track {
      position:relative;
      z-index:2;
      width:100%;
      min-height:104px;
      transition:transform .22s cubic-bezier(.3,.8,.6,1);
      will-change:transform;
    }
    .h-delete-reveal {
      position:absolute;
      top:0;
      right:0;
      bottom:0;
      width:84px;
      z-index:1;
      display:flex; align-items:center; justify-content:center;
      background:#D93B3B; color:#fff;
      font-size:15px; font-weight:700; cursor:pointer;
      border-radius:0 18px 18px 0;
    }
    .h-swipe-item .h-card {
      width:100%;
      min-width:100%;
      min-height:104px;
      margin-bottom:0 !important;
      border-radius:18px !important;
    }
    .h-summary,
    .matchup-card { width:100%; box-sizing:border-box; }

    /* ── 数据管理（设置页）── */
    #dataManageCard { margin-top:8px; }
    html[data-platform="android"] #dataManageCard { display:none; }
    .import-label { display:inline-block; cursor:pointer; }
    .import-label input[type=file] { display:none; }
    .import-file-btn {
      display:inline-block; background:rgba(255,255,255,.1); color:rgba(255,255,255,.75);
      border-radius:10px; padding:7px 16px; font-size:13px; font-weight:600;
      transition:background .15s;
    }
    .import-label:hover .import-file-btn { background:rgba(255,255,255,.18); }

    /* ── 历史 Tab 切换 ── */
    .h-tab-bar{display:flex;gap:6px;padding:0 0 8px}
    .h-tab{flex:1;background:rgba(255,255,255,.06);border:none;color:rgba(255,255,255,.45);border-radius:10px;padding:9px 0;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s,color .15s}
    .h-tab.active{background:rgba(255,255,255,.14);color:#fff}

    /* ── 对阵卡片 ── */
    .matchup-card{background:rgba(255,255,255,.06);border-radius:14px;padding:14px 16px;margin-bottom:8px}
    .matchup-card-click{cursor:pointer}
    .matchup-head{display:flex;align-items:baseline;gap:8px;margin-bottom:10px}
    .matchup-name{font-size:16px;font-weight:700;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .matchup-vs{font-size:11px;color:rgba(255,255,255,.3);flex-shrink:0;padding:0 2px}
    .matchup-record{display:flex;align-items:center;gap:0;margin-bottom:8px}
    .matchup-wins-a{font-size:17px;font-weight:800;color:#E07060;flex:1;text-align:left}
    .matchup-wins-b{font-size:17px;font-weight:800;color:#6090B8;flex:1;text-align:right}
    .matchup-total{flex:0;font-size:12px;color:rgba(255,255,255,.3);text-align:center;min-width:52px}
    .matchup-meta{font-size:11px;color:rgba(255,255,255,.3);margin-bottom:10px}
    .matchup-log{display:flex;flex-direction:column;gap:5px;border-top:1px solid rgba(255,255,255,.07);padding-top:9px}
    .matchup-row{display:flex;align-items:center;gap:6px;cursor:pointer}
    .matchup-row-date{font-size:11px;color:rgba(255,255,255,.3);flex-shrink:0;width:32px}
    .matchup-row-score{font-size:12px;color:rgba(255,255,255,.55);flex:1}
    .matchup-row-winner{font-size:12px;font-weight:600;flex-shrink:0}
    .matchup-more{font-size:11px;color:rgba(255,255,255,.25);text-align:center;padding-top:4px}
    .matchup-open-hint{font-size:11px;color:rgba(255,255,255,.24);text-align:right;padding-top:8px}
    .matchup-detail-list{display:flex;flex-direction:column;gap:10px}
    .matchup-detail-card{
      background:rgba(255,255,255,.05);
      border-radius:14px;
      padding:14px 16px;
      cursor:pointer;
    }
    .matchup-detail-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:8px;
    }
    .matchup-detail-date{font-size:12px;color:rgba(255,255,255,.35)}
    .matchup-detail-sport{font-size:12px;color:rgba(255,255,255,.3)}
    .matchup-detail-major{font-size:22px;font-weight:800;letter-spacing:1px;color:#fff}
    .matchup-detail-minor{font-size:12px;color:rgba(255,255,255,.38);line-height:1.45}

    /* ── 运动规则提示（隐藏，保留 JS 兼容） ── */
    #sportHintCard { display:none !important; }
    .sport-hint{font-size:12px;color:rgba(255,255,255,.35);background:rgba(255,255,255,.05);border-radius:10px;padding:9px 14px;margin-top:2px;line-height:1.6}
    .sport-hint b{color:rgba(255,255,255,.6);font-weight:600}

    /* ── 历史汇总卡 ── */
    .h-summary{background:rgba(255,255,255,.06);border-radius:14px;padding:14px 16px 12px;margin-bottom:4px}
    .h-summary-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
    .h-summary-title{font-size:10px;color:rgba(255,255,255,.32);font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:0}
    .h-stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px 0}
    .h-stat-val{font-size:21px;font-weight:800;color:#fff;letter-spacing:-.5px}
    .h-stat-lbl{font-size:10px;color:rgba(255,255,255,.32);margin-top:2px}
    .h-summary-note{font-size:11px;color:rgba(255,255,255,.25);margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06)}
    /* ── 总览 ── */
    .ov-big-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
    .ov-big-cell{background:rgba(255,255,255,.06);border-radius:14px;padding:16px;text-align:center}
    .ov-big-val{font-size:26px;font-weight:800;color:#fff;letter-spacing:-.5px}
    .ov-big-lbl{font-size:11px;color:rgba(255,255,255,.32);margin-top:4px}
    .ov-section-title{font-size:11px;font-weight:600;color:rgba(255,255,255,.32);letter-spacing:1.5px;text-transform:uppercase;margin:16px 0 6px}
    .ov-card{background:rgba(255,255,255,.06);border-radius:14px;padding:4px 14px}
    .ov-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
    .ov-row:last-child{border-bottom:none}
    .ov-row-rank{font-size:12px;color:rgba(255,255,255,.3);width:16px;text-align:center;flex-shrink:0}
    .ov-row-lbl{font-size:14px;color:rgba(255,255,255,.85);flex:1}
    .ov-row-val{font-size:13px;color:rgba(255,255,255,.4);flex-shrink:0}
    .ov-bar-outer{flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden}
    .ov-bar-inner{height:100%;border-radius:3px;background:var(--accent,#0A84FF);opacity:.8}
    .ov-pair{display:flex;align-items:center;justify-content:space-between;padding:12px 0;font-size:15px;font-weight:600;color:rgba(255,255,255,.85)}
    .ov-pair-count{font-size:13px;font-weight:400;color:rgba(255,255,255,.4)}
    .ov-export-btn{width:100%;margin-top:20px;padding:14px;border:none;border-radius:14px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);font-size:15px;font-weight:600;cursor:pointer;}
    .ov-export-btn:active{background:rgba(255,255,255,.14);}

    /* ── 全场走势图 ── */
    .prog-line-a{stroke:var(--clr-a,#D95F4B)}
    .prog-line-b{stroke:var(--clr-b,#4A7FA8)}
    .prog-fill-a{fill:var(--clr-a,#D95F4B);fill-opacity:.18}
    .prog-fill-b{fill:var(--clr-b,#4A7FA8);fill-opacity:.14}

    /* ── 分段得分 ── */
    .phase-set-title{font-size:11px;color:rgba(255,255,255,.3);padding:10px 0 4px;border-top:1px solid rgba(255,255,255,.06)}
    .phase-set-title:first-child{border-top:none;padding-top:0}
    .phase-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid rgba(255,255,255,.05)}
    .phase-row:first-of-type,.phase-set-title+.phase-row{border-top:none}
    .phase-lbl{width:26px;font-size:11px;color:rgba(255,255,255,.4);flex-shrink:0}
    .phase-bar-outer{flex:1;height:7px;border-radius:4px;background:rgba(255,255,255,.07);overflow:hidden;display:flex}
    .phase-score{font-size:12px;min-width:38px;text-align:right;flex-shrink:0}
    .phase-score .sa{color:#E07060}.phase-score .sb{color:#6090B8}

    /* ── 关键球 ── */
    .crit-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid rgba(255,255,255,.05)}
    .crit-row:first-of-type{border-top:none}
    .crit-lbl{width:46px;font-size:11px;color:rgba(255,255,255,.4);flex-shrink:0}
    .crit-bar-outer{flex:1;height:7px;border-radius:4px;background:rgba(255,255,255,.07);overflow:hidden;display:flex}
    .crit-score{font-size:12px;min-width:38px;text-align:right;flex-shrink:0}
    .crit-score .sa{color:#E07060}.crit-score .sb{color:#6090B8}
    .crit-summary{font-size:12px;color:rgba(255,255,255,.35);margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06);line-height:1.7}

    /* ── 节奏分析 ── */
    .pace-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px 10px}
    .pace-stat-val{font-size:20px;font-weight:700;color:#fff;letter-spacing:-.3px}
    .pace-stat-lbl{font-size:10px;color:rgba(255,255,255,.32);margin-top:3px}
    .pace-set-bars{margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06)}
    .pace-set-row{display:flex;align-items:center;gap:10px;padding:5px 0}
    .pace-set-lbl{font-size:11px;color:rgba(255,255,255,.4);width:46px;flex-shrink:0}
    .pace-set-bar-outer{flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,.07);overflow:hidden}
    .pace-set-bar-inner{height:100%;border-radius:3px;background:rgba(255,255,255,.28)}
    .pace-set-val{font-size:11px;color:rgba(255,255,255,.4);width:42px;text-align:right;flex-shrink:0}

    /* ══════════════════════════════
       白天模式 (data-colormode="light")
       每个主题有自己的浅色背景（hue 保留，亮度提升）；
       --home-l/--home-r 本就是半透明主题色，叠在浅色底上
       会显示为微妙的主题色晕，不需要清除首页渐变。
    ══════════════════════════════ */

    /* ── 各主题浅色背景 ── */
    html[data-colormode="light"]                             { --bg:#f5f0ee; } /* 默认：暖白 */
    html[data-colormode="light"][data-theme="tennis"]        { --bg:#edf7ef; } /* 绿韵 */
    html[data-colormode="light"][data-theme="basketball"]    { --bg:#fdf3ea; } /* 橙韵 */
    html[data-colormode="light"][data-theme="badminton"]     { --bg:#edf3ff; } /* 蓝韵 */
    html[data-colormode="light"][data-theme="flame"]         { --bg:#fff0ee; } /* 暖红韵 */
    html[data-colormode="light"][data-theme="football"]      { --bg:#edf5ee; } /* 草绿韵 */
    html[data-colormode="light"][data-theme="neon"]          { --bg:#f2fae0; } /* 黄绿韵 */
    html[data-colormode="light"][data-theme="aurora"]        { --bg:#e8fafb; } /* 青韵 */
    html[data-colormode="light"][data-theme="violet"]        { --bg:#f2eeff; } /* 紫韵 */
    html[data-colormode="light"][data-theme="rose"]          { --bg:#fff0f5; } /* 玫瑰韵 */
    html[data-colormode="light"][data-theme="gold"]          { --bg:#fffce8; } /* 金韵 */
    html[data-colormode="light"][data-theme="bw"]            { --bg:#f5f5f5; } /* 纯灰 */

    html[data-colormode="light"] body { background:var(--bg); color:#1c1c1e; }
    /* 首页：--clr-a/b 是不透明深色，在浅色背景上会把背景盖死；
       改用已有的半透明版本 --home-l/r，让浅色 --bg 透出来 */
    html[data-colormode="light"] #homeScreen {
      background-image: linear-gradient(to right, var(--home-l) 50%, var(--home-r) 50%);
    }
    html[data-colormode="light"] #homeLogo { color:#1c1c1e; }
    html[data-colormode="light"] #homeSub { color:rgba(0,0,0,.35); }
    /* 导航 */
    html[data-colormode="light"] .back-btn { color:rgba(0,0,0,.65); }
    html[data-colormode="light"] .hist-export-btn { background:rgba(0,0,0,.08); color:rgba(0,0,0,.7); }
    html[data-colormode="light"] .hist-export-btn:active { background:rgba(0,0,0,.15); }
    html[data-colormode="light"] .import-file-btn { background:rgba(0,0,0,.07); color:rgba(0,0,0,.7); }
    /* 首页按钮 */
    html[data-colormode="light"] #homeSettingsBtn { background:rgba(0,0,0,.06); color:rgba(0,0,0,.5); }
    html[data-colormode="light"] .home-btn.primary { background:rgba(0,0,0,.88); color:#fff; }
    html[data-colormode="light"] .home-btn.ghost { background:rgba(0,0,0,.08); color:rgba(0,0,0,.7); }
    /* 比赛设置页 */
    html[data-colormode="light"] #teamsCard { background:#fff; }
    html[data-colormode="light"] .team-row { border-bottom-color:rgba(0,0,0,.07); }
    html[data-colormode="light"] .team-label { color:rgba(0,0,0,.8); }
    html[data-colormode="light"] .team-input { color:#1c1c1e; caret-color:#1c1c1e; }
    html[data-colormode="light"] .team-input::placeholder { color:rgba(0,0,0,.2); }
    html[data-colormode="light"] .s-pill { color:rgba(0,0,0,.35); }
    html[data-colormode="light"] .s-pill.active { color:#1c1c1e; }
    html[data-colormode="light"] .s-pill:not(.active) .s-icon { opacity:.6; }
    html[data-colormode="light"] .s-icon img { mix-blend-mode:normal; }
    html[data-colormode="light"] #rulesCard { background:#fff; }
    html[data-colormode="light"] .rule-row { border-bottom-color:rgba(0,0,0,.07); }
    html[data-colormode="light"] .rule-name { color:rgba(0,0,0,.8); }
    html[data-colormode="light"] .step-btn { background:rgba(0,0,0,.08); color:rgba(0,0,0,.7); }
    html[data-colormode="light"] .step-btn:active { background:rgba(0,0,0,.18); }
    html[data-colormode="light"] .step-val { color:#1c1c1e; }
    /* 开始比赛按钮——强制高对比度，防止 bw 主题 accent 太浅 */
    html[data-colormode="light"] #startBtn { background:rgba(0,0,0,.85); color:#fff; }
    /* 历史卡 */
    html[data-colormode="light"] .h-empty-title { color:rgba(0,0,0,.35); }
    html[data-colormode="light"] .h-empty-desc  { color:rgba(0,0,0,.22); }
    /* 总览 */
    html[data-colormode="light"] .ov-big-cell   { background:#fff; }
    html[data-colormode="light"] .ov-big-val    { color:#1c1c1e; }
    html[data-colormode="light"] .ov-big-lbl    { color:rgba(0,0,0,.35); }
    html[data-colormode="light"] .ov-section-title { color:rgba(0,0,0,.35); }
    html[data-colormode="light"] .ov-card       { background:#fff; }
    html[data-colormode="light"] .ov-row-lbl    { color:#1c1c1e; }
    html[data-colormode="light"] .ov-row-rank   { color:rgba(0,0,0,.3); }
    html[data-colormode="light"] .ov-row-val    { color:rgba(0,0,0,.5); }
    html[data-colormode="light"] .ov-bar-outer  { background:rgba(0,0,0,.07); }
    html[data-colormode="light"] .ov-pair       { color:#1c1c1e; }
    html[data-colormode="light"] .ov-pair-count { color:rgba(0,0,0,.4); }
    html[data-colormode="light"] .ov-export-btn { background:rgba(0,0,0,.07); color:rgba(0,0,0,.7); }
    html[data-colormode="light"] .ov-export-btn:active { background:rgba(0,0,0,.13); }
    html[data-colormode="light"] .h-card { background:#fff; }
    html[data-colormode="light"] .h-card:active { background:#eef0f5; }
    html[data-colormode="light"] .h-team.winner { color:#1c1c1e; }
    html[data-colormode="light"] .h-team.loser { color:rgba(0,0,0,.35); }
    html[data-colormode="light"] .h-vs-score { color:#1c1c1e; }
    html[data-colormode="light"] .h-sport { color:rgba(0,0,0,.4); }
    html[data-colormode="light"] .h-date { color:rgba(0,0,0,.28); }
    html[data-colormode="light"] .h-set-line { color:rgba(0,0,0,.35); }
    html[data-colormode="light"] .h-duration { color:rgba(0,0,0,.25); }
    /* 标签页 */
    html[data-colormode="light"] .h-tab { background:rgba(0,0,0,.06); color:rgba(0,0,0,.45); }
    html[data-colormode="light"] .h-tab.active { background:rgba(0,0,0,.14); color:#1c1c1e; }
    /* 汇总 */
    html[data-colormode="light"] .h-summary { background:rgba(0,0,0,.04); }
    html[data-colormode="light"] .h-summary-title { color:rgba(0,0,0,.32); }
    html[data-colormode="light"] .h-stat-val { color:#1c1c1e; }
    html[data-colormode="light"] .h-stat-lbl { color:rgba(0,0,0,.3); }
    html[data-colormode="light"] .h-summary-note { color:rgba(0,0,0,.25); border-top-color:rgba(0,0,0,.06); }
    /* 对阵 */
    html[data-colormode="light"] .matchup-card { background:#fff; }
    html[data-colormode="light"] .matchup-name { color:#1c1c1e; }
    html[data-colormode="light"] .matchup-vs { color:rgba(0,0,0,.3); }
    html[data-colormode="light"] .matchup-total { color:rgba(0,0,0,.3); }
    html[data-colormode="light"] .matchup-meta { color:rgba(0,0,0,.3); }
    html[data-colormode="light"] .matchup-row-date { color:rgba(0,0,0,.3); }
    html[data-colormode="light"] .matchup-row-score { color:rgba(0,0,0,.55); }
    html[data-colormode="light"] .matchup-more { color:rgba(0,0,0,.25); }
    html[data-colormode="light"] .matchup-open-hint { color:rgba(0,0,0,.24); }
    html[data-colormode="light"] .matchup-detail-date { color:rgba(0,0,0,.35); }
    html[data-colormode="light"] .matchup-detail-sport { color:rgba(0,0,0,.3); }
    html[data-colormode="light"] .matchup-detail-major { color:#1c1c1e; }
    /* 详情 */
    html[data-colormode="light"] .d-card { background:#fff; }
    html[data-colormode="light"] .d-names { color:#1c1c1e; }
    html[data-colormode="light"] .d-names .d-vs { color:rgba(0,0,0,.3); }
    html[data-colormode="light"] .d-result { color:rgba(0,0,0,.4); }
    html[data-colormode="light"] .d-section-title { color:rgba(0,0,0,.35); }
    html[data-colormode="light"] .set-row { border-bottom-color:rgba(0,0,0,.06); }
    html[data-colormode="light"] .set-label { color:rgba(0,0,0,.5); }
    html[data-colormode="light"] .set-score { color:#1c1c1e; }
    html[data-colormode="light"] .set-time { color:rgba(0,0,0,.3); }
    html[data-colormode="light"] .set-detail-card { background:rgba(0,0,0,.04); }
    html[data-colormode="light"] .set-detail-title { color:#1c1c1e; }
    html[data-colormode="light"] .set-detail-score { color:rgba(0,0,0,.85); }
    html[data-colormode="light"] .set-detail-time { color:rgba(0,0,0,.35); }
    html[data-colormode="light"] .set-detail-rule { color:rgba(0,0,0,.32); }
    html[data-colormode="light"] .streak-item { border-bottom-color:rgba(0,0,0,.06); }
    html[data-colormode="light"] .streak-count { color:rgba(0,0,0,.4); }
    html[data-colormode="light"] .streak-time { color:rgba(0,0,0,.28); }
    html[data-colormode="light"] .streak-badge { background:rgba(0,0,0,.08); }
    html[data-colormode="light"] .log-set-header { color:rgba(0,0,0,.35); }
    html[data-colormode="light"] .log-run { border-top-color:rgba(0,0,0,.06); }
    html[data-colormode="light"] .log-pts { color:rgba(0,0,0,.35); }
    html[data-colormode="light"] .log-point-time { color:rgba(0,0,0,.32); }
    html[data-colormode="light"] .log-score { color:rgba(0,0,0,.6); }
    html[data-colormode="light"] .pace-stat-val { color:#1c1c1e; }
    html[data-colormode="light"] .pace-stat-lbl { color:rgba(0,0,0,.32); }
    html[data-colormode="light"] .pace-set-bars { border-top-color:rgba(0,0,0,.06); }
    html[data-colormode="light"] .pace-set-lbl { color:rgba(0,0,0,.4); }
    html[data-colormode="light"] .pace-set-bar-outer { background:rgba(0,0,0,.07); }
    html[data-colormode="light"] .pace-set-bar-inner { background:rgba(0,0,0,.28); }
    html[data-colormode="light"] .pace-set-val { color:rgba(0,0,0,.4); }
    /* 各阶段得分 (phase) */
    html[data-colormode="light"] .phase-set-title { color:rgba(0,0,0,.3); border-top-color:rgba(0,0,0,.06); }
    html[data-colormode="light"] .phase-row { border-top-color:rgba(0,0,0,.05); }
    html[data-colormode="light"] .phase-lbl { color:rgba(0,0,0,.4); }
    html[data-colormode="light"] .phase-bar-outer { background:rgba(0,0,0,.07); }
    /* 关键球 (crit) */
    html[data-colormode="light"] .crit-row { border-top-color:rgba(0,0,0,.05); }
    html[data-colormode="light"] .crit-lbl { color:rgba(0,0,0,.4); }
    html[data-colormode="light"] .crit-bar-outer { background:rgba(0,0,0,.07); }
    html[data-colormode="light"] .crit-summary { color:rgba(0,0,0,.35); }
    /* 设置 */
    html[data-colormode="light"] .settings-scroll { background:var(--bg); }
    html[data-colormode="light"] .settings-card { background:#fff; }
    html[data-colormode="light"] .settings-row { border-bottom-color:rgba(0,0,0,.07); }
    html[data-colormode="light"] .option-row { border-top-color:rgba(0,0,0,.07); }
    html[data-colormode="light"] .settings-title { color:rgba(0,0,0,.82); }
    html[data-colormode="light"] .settings-desc { color:rgba(0,0,0,.4); }
    html[data-colormode="light"] .collapse-header { background:rgba(0,0,0,.05); }
    html[data-colormode="light"] .collapse-header:active { background:rgba(0,0,0,.09); }
    html[data-colormode="light"] .collapse-header-left { color:rgba(0,0,0,.8); }
    html[data-colormode="light"] .collapse-header-right { color:rgba(0,0,0,.35); }
    html[data-colormode="light"] .collapse-chevron { color:rgba(0,0,0,.3); }
    html[data-colormode="light"] .theme-name { color:rgba(0,0,0,.45); }
    html[data-colormode="light"] .theme-wrap.active-wrap .theme-name { color:rgba(0,0,0,.9); }
    html[data-colormode="light"] .choice-btn { background:rgba(0,0,0,.06); color:rgba(0,0,0,.6); }
    html[data-colormode="light"] .toggle-btn:not(.on) { background:rgba(0,0,0,.18); }
    /* 比赛辅助 */
    html[data-colormode="light"] .pill-label { background:rgba(0,0,0,.08); color:rgba(0,0,0,.55); }
    html[data-colormode="light"] .bb-btn { background:rgba(0,0,0,.1); }
    html[data-colormode="light"] .bb-btn:active { background:rgba(0,0,0,.25); }
    /* 菜单 */
    html[data-colormode="light"] .menu-card { background:#fff; box-shadow:0 2px 16px rgba(0,0,0,.10); }
    html[data-colormode="light"] .menu-cancel { background:#fff; color:rgba(0,0,0,.7); box-shadow:0 2px 16px rgba(0,0,0,.10); }
    html[data-colormode="light"] .menu-item { color:#1c1c1e; border-bottom-color:rgba(0,0,0,.08); }
    html[data-colormode="light"] .menu-item.danger { color:#FF3B30; }
    html[data-colormode="light"] .menu-item:active { background:rgba(0,0,0,.06); }
  </style>
</head>

<!-- ══════════════════════════════
     首页
══════════════════════════════ -->
<div class="screen" id="homeScreen">
  <div id="homeLogo">记分器</div>
  <div id="homeSub">Sport Scoreboard</div>
  <button class="home-btn primary" onclick="navTo('setup')">新比赛</button>
  <button class="home-btn ghost"   onclick="navTo('history')">历史记录</button>
  <button id="homeSettingsBtn" onclick="navTo('settings')"><span class="home-settings-ico">⚙</span><span class="home-settings-label">设置</span></button>
</div>

<!-- ══════════════════════════════
     设置页
══════════════════════════════ -->
<div class="screen out" id="setupScreen">
  <div class="back-bar">
    <button class="back-btn" onclick="navTo('home')">‹ 返回</button>
  </div>
  <div id="setupControls">
    <!-- 队名 -->
    <div id="teamsCard">
      <div class="team-row">

<script>
const APP_PLATFORM = (() => {
  try {
    const capPlatform = window.Capacitor && typeof window.Capacitor.getPlatform === 'function'
      ? window.Capacitor.getPlatform()
      : null;
    if (capPlatform === 'android') return 'android';
    if (capPlatform === 'ios') return 'ios';
  } catch (e) {}
  if (/Android/i.test(navigator.userAgent)) return 'android';
  if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) return 'ios';
  return 'desktop';
})();
document.documentElement.dataset.platform = APP_PLATFORM === 'ios' ? 'android' : APP_PLATFORM;
document.documentElement.dataset.nativePlatform = APP_PLATFORM;

// 原生移动端：先用 env() 尝试，不行就按方向给合理默认值；Android 原生层会再注入精确值
if (APP_PLATFORM === 'android' || APP_PLATFORM === 'ios') {
  const applySafeAreaInsets = () => {
    const probe = document.createElement('div');
    probe.style.cssText = 'position:fixed;top:env(safe-area-inset-top,0px);right:env(safe-area-inset-right,0px);bottom:env(safe-area-inset-bottom,0px);left:env(safe-area-inset-left,0px);pointer-events:none;opacity:0';
    document.documentElement.appendChild(probe);
    const cs = window.getComputedStyle(probe);
    const t = parseFloat(cs.top) || 0;
    const rgt = parseFloat(cs.right) || 0;
    const b = parseFloat(cs.bottom) || 0;
    const lft = parseFloat(cs.left) || 0;
    probe.remove();
    const r = document.documentElement;
    const isLandscape = window.innerWidth > window.innerHeight;
    const topFallback = APP_PLATFORM === 'ios'
      ? (isLandscape ? 0 : 28)
      : 28;
    const bottomFallback = APP_PLATFORM === 'ios'
      ? (isLandscape ? 8 : 16)
      : 16;
    r.style.setProperty('--safe-top',    (t > 2 ? t : topFallback) + 'px');
    r.style.setProperty('--safe-right',  (rgt > 2 ? rgt : 0) + 'px');
    r.style.setProperty('--safe-bottom', (b > 2 ? b : bottomFallback) + 'px');
    r.style.setProperty('--safe-left',   (lft > 2 ? lft : 0) + 'px');
  };
  applySafeAreaInsets();
  window.addEventListener('resize', applySafeAreaInsets, { passive: true });
  window.addEventListener('orientationchange', applySafeAreaInsets, { passive: true });
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', applySafeAreaInsets, { passive: true });
  }
}

// ══════════════════════════════════════════
// 导航
// ══════════════════════════════════════════
const SCREENS = { home:'homeScreen', setup:'setupScreen', game:'gameScreen', history:'historyScreen', detail:'detailScreen', settings:'settingsScreen' };
let currentScreen = 'home';
// 应用内导航栈（安卓返回键支持，不依赖 browser history）
const navStack = [];

function navTo(name, dir) {
  if (!SCREENS[name] || name === currentScreen) return;
  const prev = document.getElementById(SCREENS[currentScreen]);
  const next = document.getElementById(SCREENS[name]);

  // 滑动方向
  const goForward = !dir || dir === 'forward';
  prev.classList.add(goForward ? 'slide-left' : 'slide-right');
  next.classList.remove('out','slide-left','slide-right');

  // 特定页面的初始化
  if (name === 'history') renderHistoryList();
  if (name === 'settings') { renderThemeGrid(); renderColorModeToggle(); renderAntiMistouch(); renderBackButtonToggle(); renderFeedbackSettings(); }

  // 前进时把当前页入栈；后退时不入栈（由调用方 pop 出来）
  if (goForward) navStack.push(currentScreen);
  currentScreen = name;
}

// 由原生返回键调用；返回 true 表示已处理，false 表示退到后台
window.handleAndroidBack = function() {
  const overlay = document.getElementById('overlay');
  const menuSheet = document.getElementById('menuSheet');
  if (overlay && !overlay.hidden) { overlay.hidden = true; return true; }
  if (menuSheet && menuSheet.classList.contains('open')) { closeMenu(); return true; }
  clearPendingScore(false);
  if (navStack.length > 0) {
    const prev = navStack.pop();
    navTo(prev, 'back');
    return true;
  }
  if (currentScreen !== 'home') {
    navTo('home', 'back');
    return true;
  }
  return false;
};
window.handleNativeBack = window.handleAndroidBack;

function navBack() {
  if (navStack.length > 0) {
    navTo(navStack.pop(), 'back');
  } else {
    navTo('home', 'back');
  }
}

function goHistory() {
  document.getElementById('overlay').hidden = true;
  // 直接打开最新一条详情，跳过历史列表
  // 返回路径：detail → home（game 不应在栈里）
  try {
    const all = JSON.parse(localStorage.getItem('sb_history') || '[]');
    if (all.length > 0) {
      const r = all[0];
      currentDetailMode = 'match';
      currentDetailId = r.id;
      renderDetail(r);
      navTo('detail');  // 把当前 'game' 压栈
      // 把 'game' 替换成 'home'+'history'，路径：detail→历史→首页
      const gi = navStack.indexOf('game');
      if (gi !== -1) navStack.splice(gi, 1, 'home', 'history');
      return;
    }
  } catch(e) {}
  // 没有记录时退到历史列表
  navTo('history');
  const gi = navStack.indexOf('game');
  if (gi !== -1) navStack[gi] = 'home';
}

// ══════════════════════════════════════════
// 设置状态
// ══════════════════════════════════════════
const SPORT_DEFS = {
  badminton:   { ptWin:21, ptDeuce:20, ptMax:30,   setsOpts:[1,3,5],  setWin:2, label:'羽毛球' },
  tabletennis: { ptWin:11, ptDeuce:10, ptMax:null,  setsOpts:[3,5,7],  setWin:3, label:'乒乓球' },
  tennis:      { ptWin:null,           setsOpts:[3,5],                 setWin:2, label:'网球'   },
  basketball:  { ptWin:null,           setsOpts:[],                    setWin:0, label:'篮球'   },
};

let CFG = { sport:'badminton', names:['队伍 A','队伍 B'], ptWin:21, ptDeuce:20, ptMax:30, setWin:2, totalSets:3 };
let colorMode = localStorage.getItem('sb_color_mode') || 'dark'; // 'dark' | 'light'
let antiMistouch = localStorage.getItem('sb_anti_mistouch') === '1';
let antiMistouchTipSeen = localStorage.getItem('sb_anti_mistouch_tip_seen') === '1';
const storedShowBackButton = localStorage.getItem('sb_show_back_button');
let showBackButton = storedShowBackButton === null ? APP_PLATFORM !== 'ios' : storedShowBackButton !== '0';
let scoreVibrate = localStorage.getItem('sb_score_vibrate') !== '0';
let scoreSound = localStorage.getItem('sb_score_sound') === '1';
let scoreSoundType = localStorage.getItem('sb_score_sound_type') || 'chime';
let pendingScore = null;
let pendingScoreTimer = null;
let ptDraft = String(CFG.ptWin);
let setsDraft = String(CFG.totalSets);
let audioCtx = null;
let edgeSwipeBack = null;

function setSport(btn) {
  document.querySelectorAll('.s-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  CFG.sport = btn.dataset.sport;
  applyDefaults(); updateRulesUI();
}
function applyDefaults() {
  const d = SPORT_DEFS[CFG.sport];
  if (d.ptWin)     { CFG.ptWin=d.ptWin; CFG.ptDeuce=d.ptDeuce; CFG.ptMax=d.ptMax; }
  if (d.setsOpts.length && !d.setsOpts.includes(CFG.totalSets)) CFG.totalSets=d.setsOpts[0];
  CFG.setWin=Math.ceil(CFG.totalSets/2);
  ptDraft=String(CFG.ptWin);
  setsDraft=String(CFG.totalSets);
}
const SPORT_HINTS = {
  badminton:   '<b>羽毛球</b>：21 分制，赢球方发球，领先 2 分获局，30 分强制封顶。3局2胜或5局3胜。',
  tabletennis: '<b>乒乓球</b>：11 分制，每 2 分换发（10 平后每 1 分换），领先 2 分获局。3/5/7 局制。',
  tennis:      '<b>网球</b>：0 → 15 → 30 → 40 → 占先，先赢 6 局且领先 2 局得 1 盘，6:6 进抢七。3/5 盘制。',
  basketball:  '<b>篮球</b>：投篮 +2 分，三分线外 +3 分，罚球 +1 分。4 节制，各节结束后点击菜单 "下一节"。',
};
function updateRulesUI() {
  const sp=CFG.sport; const hasPt=sp==='badminton'||sp==='tabletennis'; const hasSets=sp!=='basketball';
  document.getElementById('rulePoints').style.display=hasPt?'':'none';
  document.getElementById('ruleSets').style.display=hasSets?'':'none';
  document.getElementById('rulesCard').style.display=(hasPt||hasSets)?'':'none';
  const hint=document.getElementById('sportHintCard');
  if(hint) hint.innerHTML=SPORT_HINTS[sp]||'';
  syncRuleInputs();
}
function stepPt(d) {
  commitPtDraft();
  inputPt(CFG.ptWin+d);
  commitPtDraft();
}
function stepSets(d) {
  if(CFG.sport==='basketball') return;
  commitSetsDraft();
  inputSets(CFG.totalSets+d);
  commitSetsDraft();
}
function clampInt(v, min, max, fallback){
  const n=parseInt(v,10);
  if(Number.isNaN(n)) return fallback;
  return Math.max(min, Math.min(max, n));
}
function inputPt(v){
  if(v===''){ ptDraft=''; return; }
  ptDraft=String(clampInt(v,1,999,CFG.ptWin));
  const pt=document.getElementById('valPt');
  if(pt && document.activeElement===pt && pt.value!==ptDraft) pt.value=ptDraft;
}
function commitPtDraft(){
  CFG.ptWin=clampInt(ptDraft,1,999,CFG.ptWin);
  CFG.ptDeuce=CFG.ptWin-1;
  CFG.ptMax=CFG.sport==='badminton'?CFG.ptWin+9:null;
  ptDraft=String(CFG.ptWin);
  syncRuleInputs();
}
function inputSets(v){
  if(v===''){ setsDraft=''; return; }
  setsDraft=String(clampInt(v,1,999,CFG.totalSets));
  const sets=document.getElementById('valSets');
  if(sets && document.activeElement===sets && sets.value!==setsDraft) sets.value=setsDraft;
}
function commitSetsDraft(){
  if(CFG.sport==='basketball') return;
  CFG.totalSets=clampInt(setsDraft,1,999,CFG.totalSets);
  CFG.setWin=Math.ceil(CFG.totalSets/2);
  setsDraft=String(CFG.totalSets);
  syncRuleInputs();
}
function syncRuleInputs(){
  const pt=document.getElementById('valPt');
  const sets=document.getElementById('valSets');
  if(pt && document.activeElement!==pt) pt.value=ptDraft;
  if(sets && document.activeElement!==sets) sets.value=setsDraft;
}
function applyColorMode(mode){
  colorMode=mode;
  document.documentElement.dataset.colormode = mode==='light' ? 'light' : '';
  localStorage.setItem('sb_color_mode', mode);
  renderColorModeToggle();
}
function renderColorModeToggle(){
  renderToggleButton('colorModeBtn', colorMode==='light', '白天模式已开启', '白天模式已关闭');
}
function toggleColorMode(){
  applyColorMode(colorMode==='light' ? 'dark' : 'light');
}
function renderAntiMistouch(){
  const btn=document.getElementById('antiMistouchBtn');
  if(!btn) return;
  btn.textContent='';
  btn.classList.toggle('on', antiMistouch);
  btn.setAttribute('aria-pressed', antiMistouch ? 'true' : 'false');
  btn.setAttribute('aria-label', antiMistouch ? '双击防误触已开启' : '双击防误触已关闭');
}
function renderToggleButton(id, on, onLabel, offLabel){
  const btn=document.getElementById(id);
  if(!btn) return;
  btn.textContent='';
  btn.classList.toggle('on', on);
  btn.setAttribute('aria-pressed', on ? 'true' : 'false');
  btn.setAttribute('aria-label', on ? onLabel : offLabel);
}
function applyBackButtonVisibility(){
  document.documentElement.classList.toggle('show-back-btn', APP_PLATFORM!=='desktop' && showBackButton);
}
function renderBackButtonToggle(){
  renderToggleButton('backButtonToggleBtn', showBackButton, '返回按钮已显示', '返回按钮已隐藏');
}
function renderFeedbackSettings(){
  renderToggleButton('scoreVibrateBtn', scoreVibrate, '记分振动已开启', '记分振动已关闭');
  renderToggleButton('scoreSoundBtn', scoreSound, '记分音效已开启', '记分音效已关闭');
  const row=document.getElementById('soundTypeRow');
  if(row) row.hidden=!scoreSound;
  document.querySelectorAll('#soundTypeGroup .choice-btn').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.soundType===scoreSoundType);
  });
}
function toggleAntiMistouch(){
  antiMistouch=!antiMistouch;
  localStorage.setItem('sb_anti_mistouch', antiMistouch ? '1' : '0');
  clearPendingScore(false);
  renderAntiMistouch();
}
function toggleBackButtonVisibility(){
  showBackButton=!showBackButton;

function toggleScoreVibrate(){

  localStorage.setItem('sb_score_vibrate', scoreVibrate ? '1' : '0');
  renderFeedbackSettings();
}
function toggleScoreSound(){
  scoreSound=!scoreSound;
  localStorage.setItem('sb_score_sound', scoreSound ? '1' : '0');
  if(scoreSound) primeAudio();
