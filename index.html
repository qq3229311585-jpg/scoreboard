function setScoreSoundType(type){
  scoreSoundType=type;
  localStorage.setItem('sb_score_sound_type', type);
  primeAudio();
  renderFeedbackSettings();
}
function primeAudio(){
  const Ctx=window.AudioContext||window.webkitAudioContext;
  if(!Ctx) return null;
  if(!audioCtx) audioCtx=new Ctx();
  if(audioCtx.state==='suspended') audioCtx.resume().catch(()=>{});
  return audioCtx;
}
function pulseOsc(ctx, at, {type='sine', from=880, to=640, gain=0.028, dur=0.08}={}){
  const osc=ctx.createOscillator();
  const amp=ctx.createGain();
  osc.type=type;
  osc.frequency.setValueAtTime(from, at);
  osc.frequency.exponentialRampToValueAtTime(Math.max(60,to), at+dur);
  amp.gain.setValueAtTime(0.0001, at);
  amp.gain.exponentialRampToValueAtTime(gain, at+0.01);
  amp.gain.exponentialRampToValueAtTime(0.0001, at+dur);
  osc.connect(amp).connect(ctx.destination);
  osc.start(at);
  osc.stop(at+dur+0.02);
}
function playScoreSound(kind='score'){
  if(!scoreSound) return;
  const ctx=primeAudio();
  if(!ctx) return;
  const at=ctx.currentTime+0.01;
  if(scoreSoundType==='pulse'){
    if(kind==='set'){
      pulseOsc(ctx, at, {type:'square', from:720, to:520, gain:0.022, dur:0.06});
      pulseOsc(ctx, at+0.09, {type:'square', from:980, to:720, gain:0.02, dur:0.07});
    }else{
      pulseOsc(ctx, at, {type:'square', from:940, to:680, gain:0.018, dur:0.05});
    }
    return;
  }
  if(kind==='set'){
    pulseOsc(ctx, at, {type:'triangle', from:740, to:980, gain:0.022, dur:0.07});
    pulseOsc(ctx, at+0.08, {type:'sine', from:980, to:1280, gain:0.018, dur:0.1});
    return;
  }
  pulseOsc(ctx, at, {type:'triangle', from:1040, to:1320, gain:0.02, dur:0.055});
}
function playScoreVibration(kind='score'){
  if(!scoreVibrate) return;
  // 优先走 Capacitor 原生 Haptics；iPhone 上不要退回到无效的 navigator.vibrate
  try {
    const H = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Haptics;
    if (H) {
      if (kind === 'set') {
        if (typeof H.notification === 'function') {
          H.notification({ type: 'SUCCESS' });
          if (typeof H.impact === 'function') {
            setTimeout(() => H.impact({ style: 'HEAVY' }), 70);
          }
        } else if (typeof H.vibrate === 'function') {
          H.vibrate({ duration: 160 });
        }
      } else {
        if (typeof H.impact === 'function') {
          H.impact({ style: 'MEDIUM' });
        } else if (typeof H.selectionChanged === 'function') {
          H.selectionChanged();
        } else if (typeof H.vibrate === 'function') {
          H.vibrate({ duration: 90 });
        }
      }
      return;
    }
  } catch(e) {}
  // 备用：Web Vibration API
  if (navigator.vibrate) {
    navigator.vibrate(kind === 'set' ? [120, 60, 160] : 90);
  }
}
function emitScoreFeedback(kind='score'){
  playScoreVibration(kind);
  playScoreSound(kind);
}
function clearPendingScore(shouldRender=true){
  pendingScore=null;
  if(pendingScoreTimer){
    clearTimeout(pendingScoreTimer);
    pendingScoreTimer=null;
  }
  if(shouldRender&&S&&S.winner===null) render();
}
function queueScore(actionKey, hint, applyFn){
  if(!antiMistouch){
    applyFn();
    return;
  }
  if(pendingScore&&pendingScore.key===actionKey){
    clearPendingScore(false);
    applyFn();
    return;
  }
  pendingScore={ key:actionKey };
  if(pendingScoreTimer) clearTimeout(pendingScoreTimer);
  if(!antiMistouchTipSeen){
    antiMistouchTipSeen = true;
    localStorage.setItem('sb_anti_mistouch_tip_seen', '1');
    setPill(`再点一次${hint}`);
  }
  pendingScoreTimer=setTimeout(()=>{ clearPendingScore(); }, 900);
}

function blockScoreWhilePaused(){
  if(!isClockPaused()) return false;
  clearPendingScore(false);
  setPill('比赛已暂停');
  return true;
}

function shouldEnableEdgeSwipeBack(){
  if (APP_PLATFORM !== 'ios') return false;
  if (currentScreen === 'home' || currentScreen === 'game') return false;
  const overlay = document.getElementById('overlay');
  const menuSheet = document.getElementById('menuSheet');
  const deleteSheet = document.getElementById('deleteSheet');
  if (overlay && !overlay.hidden) return false;
  if (menuSheet && menuSheet.classList.contains('open')) return false;
  if (deleteSheet && deleteSheet.classList.contains('open')) return false;
  return true;
}

function installEdgeSwipeBack(){
  if (APP_PLATFORM !== 'ios' || edgeSwipeBack) return;
  const EDGE_LIMIT = 32;
  const TRIGGER_X = 78;
  const LOCK_X = 12;
  const LOCK_RATIO = 1.15;

  function resetEdgeSwipe(){
    edgeSwipeBack = null;
  }

  document.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1 || !shouldEnableEdgeSwipeBack()) {
      resetEdgeSwipe();
      return;
    }
    const touch = e.touches[0];
    if ((touch.clientX || 0) > EDGE_LIMIT) {
      resetEdgeSwipe();
      return;
    }
    const target = e.target;
    if (target && target.closest && target.closest('input, textarea, select, [contenteditable="true"]')) {
      resetEdgeSwipe();
      return;
    }
    edgeSwipeBack = {
      startX: touch.clientX || 0,
      startY: touch.clientY || 0,
      active: false,
      handled: false
    };
  }, { passive: true });

  document.addEventListener('touchmove', (e) => {
    if (!edgeSwipeBack || edgeSwipeBack.handled || e.touches.length !== 1) return;
    const touch = e.touches[0];
    const dx = (touch.clientX || 0) - edgeSwipeBack.startX;
    const dy = Math.abs((touch.clientY || 0) - edgeSwipeBack.startY);
    if (!edgeSwipeBack.active) {
      if (dx > LOCK_X && dx > dy * LOCK_RATIO) {
        edgeSwipeBack.active = true;
      } else if (dy > LOCK_X || dx < -LOCK_X) {
        resetEdgeSwipe();
        return;
      }
    }
    if (edgeSwipeBack.active) e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchend', (e) => {
    if (!edgeSwipeBack || edgeSwipeBack.handled) {
      resetEdgeSwipe();
      return;
    }
    const touch = e.changedTouches && e.changedTouches[0];
    const endX = touch ? (touch.clientX || 0) : edgeSwipeBack.startX;
    const endY = touch ? (touch.clientY || 0) : edgeSwipeBack.startY;
    const dx = endX - edgeSwipeBack.startX;
    const dy = Math.abs(endY - edgeSwipeBack.startY);
    if (edgeSwipeBack.active && dx >= TRIGGER_X && dx > dy * LOCK_RATIO && shouldEnableEdgeSwipeBack()) {
      edgeSwipeBack.handled = true;
      navBack();
    }
    resetEdgeSwipe();
  }, { passive: true });

  document.addEventListener('touchcancel', resetEdgeSwipe, { passive: true });
}

function startGame() {
  CFG.names=[
    document.getElementById('inputA').value.trim()||'队伍 A',
    document.getElementById('inputB').value.trim()||'队伍 B',
  ];
  clearPendingScore(false);
  S=mkState(); H=[]; render();
  navTo('game');
}

// ══════════════════════════════════════════
// 比赛状态
// ══════════════════════════════════════════
let S=null, H=[];

function mkState() {
  const now=Date.now();
  const base={ winner:null, events:[], startTime:now, elapsedMs:0, pausedAt:null, sidesSwapped:false };
  const sp=CFG.sport;
  if(sp==='tennis')     return {...base,pts:[0,0],games:[0,0],sets:[0,0],setLog:[],serving:0,tb:false,tbPts:[0,0],setTimes:[now]};
  if(sp==='basketball') return {...base,score:[0,0],quarter:1};
  return {...base,pts:[0,0],sets:[0,0],setNum:1,setScores:[],serving:0,setServe:0,setTimes:[now]};
}

// 记录事件
function recordEvent(p, delta, nextScore, setIndex) {
  const elapsed = getElapsedMs();
  const last = S.events[S.events.length-1];
  S.events.push({
    p,
    delta,
    setIndex,
    t: Date.now(),
    elapsedMs: elapsed,
    pointMs: last ? Math.max(0, elapsed-last.elapsedMs) : elapsed,
    cumA: nextScore[0],
    cumB: nextScore[1],
  });
}

function addPt(p) {
  if(!S||S.winner!==null) return;
  if(CFG.sport==='basketball') return;
  if(blockScoreWhilePaused()) return;
  queueScore(`pt-${p}`, `为${CFG.names[p]}加分`, ()=>{
    H.push(clone(S));
    const before=getCumScore();
    const setIndex=getCurrentSetIndex();
    const beforeSetIndex=setIndex;
    if(CFG.sport==='tennis') tennisPt(p); else rallyPt(p);
    recordEvent(p, 1, [before[0] + (p===0 ? 1 : 0), before[1] + (p===1 ? 1 : 0)], setIndex);
    render();
    emitScoreFeedback(getCurrentSetIndex()!==beforeSetIndex || S.winner!==null ? 'set' : 'score');
  });
}
function addBB(p,n) {
  if(!S||S.winner!==null) return;
  if(blockScoreWhilePaused()) return;
  queueScore(`bb-${p}-${n}`, `为${CFG.names[p]}加${n}分`, ()=>{
    H.push(clone(S));
    const beforeQuarter=S.quarter;
    S.score[p]+=n;
    recordEvent(p, n, [S.score[0], S.score[1]], getCurrentSetIndex());
    render();
    emitScoreFeedback(S.quarter!==beforeQuarter ? 'set' : 'score');
  });
}
function getCurrentSetIndex(){
  if(!S) return 1;
  if(CFG.sport==='tennis') return (S.setLog?.length || 0) + 1;
  if(CFG.sport==='basketball') return S.quarter || 1;
  return S.setNum || 1;
}

function getCumScore() {
  if(CFG.sport==='basketball') return [...S.score];
  // 累计得分（所有局总计）
  const done = S.events.length ? [S.events[S.events.length-1].cumA, S.events[S.events.length-1].cumB] : [0,0];
  return done;
}

// ── 羽毛球 / 乒乓球 ──
function rallyPt(p) {
  S.pts[p]++;
  if(CFG.sport==='badminton') { S.serving=p; }
  else {
    const tot=S.pts[0]+S.pts[1]; const deuce=S.pts[0]>=CFG.ptDeuce&&S.pts[1]>=CFG.ptDeuce;
    S.serving=deuce?(S.setServe+tot)%2:(S.setServe+Math.floor(tot/2))%2;
  }
  const w=checkRally(S.pts[0],S.pts[1]); if(w<0)return;
  if(!S.setScores) S.setScores=[];
  S.setScores.push([S.pts[0], S.pts[1]]);
  S.sets[w]++;
  if(!S.setTimes) S.setTimes=[S.startTime];
  S.setTimes.push(Date.now());
  if(S.sets[w]>=CFG.setWin){S.winner=w;return;}
  const ns=CFG.sport==='tabletennis'?1-w:w;
  S.setNum++; S.pts=[0,0]; S.setServe=ns; S.serving=ns;
}
function checkRally(a,b) {
  const{ptWin,ptDeuce,ptMax}=CFG;
  if(a<ptWin&&b<ptWin)return -1;
  if(ptMax&&(a>=ptMax||b>=ptMax))return a>b?0:1;
  if(a>=ptWin&&a-b>=2)return 0; if(b>=ptWin&&b-a>=2)return 1; return -1;
}

// ── 网球 ──
const TP=['0','15','30','40'];
function tennisPt(p){
  if(S.tb){tbPt(p);return;}
  const[wa,wb]=S.pts;
  if(wa>=3&&wb>=3){if(wa===wb)S.pts[p]=4;else if(S.pts[p]===4)winGame(p);else S.pts=[3,3];return;}
  S.pts[p]++;if(S.pts[p]>=4)winGame(p);
}
function winGame(p){S.games[p]++;S.pts=[0,0];S.serving=1-S.serving;checkSet();}
function checkSet(){
  const[ga,gb]=S.games;
  if(ga===6&&gb===6){S.tb=true;S.tbPts=[0,0];return;}
  let w=-1;if(ga>=6&&ga-gb>=2)w=0;else if(gb>=6&&gb-ga>=2)w=1;if(w>=0)winSet(w);
}
function tbPt(p){
  S.tbPts[p]++;const tot=S.tbPts[0]+S.tbPts[1];
  if(tot===1||(tot>1&&(tot-1)%2===0))S.serving=1-S.serving;
  const[ta,tb]=S.tbPts;if((ta>=7||tb>=7)&&Math.abs(ta-tb)>=2){S.tb=false;winSet(ta>tb?0:1);}
}
function winSet(p){
  S.setLog.push([...S.games]);S.sets[p]++;S.games=[0,0];
  if(!S.setTimes)S.setTimes=[S.startTime];S.setTimes.push(Date.now());
  if(S.sets[p]>=CFG.setWin)S.winner=p;
}

// ══════════════════════════════════════════
// 渲染比赛页
// ══════════════════════════════════════════
function render() {
  document.getElementById('nameA').textContent=CFG.names[0];
  document.getElementById('nameB').textContent=CFG.names[1];
  syncSides();
  const sp=CFG.sport;
  if(sp==='basketball')renderBB();else if(sp==='tennis')renderTennis();else renderRally();
  renderMenuButton();
  // 篮球专属菜单按钮
  const nextQBtn=document.getElementById('menuNextQ');
  const nextQLabel=document.getElementById('nextQLabel');
  if(nextQBtn){
    nextQBtn.style.display=sp==='basketball'?'':'none';
    if(sp==='basketball'&&S&&nextQLabel){
      const q=S.quarter||1;
      if(q>=4){
        nextQLabel.textContent=S.score[0]===S.score[1]?'进入加时赛':`结束第 ${q} 节`;
      } else {
        nextQLabel.textContent=`进入第 ${q+1} 节`;
      }
    }
  }
  if(S&&S.winner!==null)showWin();
}
function renderRally(){
  setNum(0,S.pts[0]);setNum(1,S.pts[1]);setSub(0,'');setSub(1,'');
  setDots(0,S.sets[0],CFG.totalSets);setDots(1,S.sets[1],CFG.totalSets);
  setServe(S.serving);showBB(false);
  const deuce=S.pts[0]>=CFG.ptDeuce&&S.pts[1]>=CFG.ptDeuce&&S.pts[0]===S.pts[1];
  setPill(`第 ${S.setNum} 局${deuce?' · 平分':''}`);
}
function renderTennis(){
  setNum(0,S.games[0]);setNum(1,S.games[1]);
  setDots(0,S.sets[0],CFG.totalSets);setDots(1,S.sets[1],CFG.totalSets);
  setServe(S.serving);showBB(false);
  if(S.tb){setSub(0,S.tbPts[0]);setSub(1,S.tbPts[1]);setPill(`第 ${S.sets[0]+S.sets[1]+1} 盘 · 决胜局`);}
  else{
    const[wa,wb]=S.pts;
    if(wa>=3&&wb>=3){if(wa===wb){setSub(0,'平');setSub(1,'平');}else if(wa>wb){setSub(0,'占先');setSub(1,'');}else{setSub(0,'');setSub(1,'占先');}}
    else{setSub(0,TP[wa]);setSub(1,TP[wb]);}
    setPill(`第 ${S.sets[0]+S.sets[1]+1} 盘`);
  }
}
function renderBB(){
  setNum(0,S.score[0]);setNum(1,S.score[1]);
  const q=S.quarter||1;
  const qLabel=q>4?`加时${q-4}`:`第 ${q} 节`;
  setSub(0,'');setSub(1,'');
  setDots(0,0,0);setDots(1,0,0);setServe(-1);showBB(true);setPill(qLabel);
}
function setNum(p,v){document.getElementById(p?'scoreB':'scoreA').textContent=v;}
function setSub(p,v){document.getElementById(p?'subB':'subA').textContent=v;}
function setPill(s){document.getElementById('statusPill').textContent=s;}
function setDots(p,won,total){
  const el=document.getElementById(p?'setsB':'setsA');
  el.textContent=total>0?'●'.repeat(won)+'○'.repeat(total-won):'';
}
function setServe(p){
  document.getElementById('serveA').classList.toggle('on',p===0);
  document.getElementById('serveB').classList.toggle('on',p===1);
}
function showBB(on){
  document.getElementById('bbA').style.display=on?'grid':'none';
  document.getElementById('bbB').style.display=on?'grid':'none';
}
function syncSides(){
  const swapped=Boolean(S&&S.sidesSwapped);
  document.getElementById('panelA').style.order=swapped?1:0;
  document.getElementById('panelB').style.order=swapped?0:1;
}
function isClockPaused(){
  return Boolean(S&&S.pausedAt);
}
function syncPausedState(){
  const paused=isClockPaused();
  document.getElementById('gameScreen').classList.toggle('game-paused', paused);
}
function getElapsedMs(){
  if(!S) return 0;
  return S.elapsedMs + (S.pausedAt ? 0 : (Date.now()-S.startTime));
}
function fmtClock(ms){
  const totalSec=Math.max(0,Math.floor(ms/1000));
  const mm=String(Math.floor(totalSec/60)).padStart(2,'0');
  const ss=String(totalSec%60).padStart(2,'0');
  return `${mm}:${ss}`;
}
function renderMenuButton(){
  const btn=document.getElementById('menuBtn');
  if(!btn) return;
  const paused=isClockPaused();
  btn.textContent=S?fmtClock(getElapsedMs()):'00:00';
  btn.classList.toggle('paused', paused);
}
function pauseClock(){
  if(!S||S.pausedAt) return;
  S.elapsedMs += Date.now()-S.startTime;
  S.pausedAt = Date.now();
  syncPausedState();
}
function resumeClock(){
  if(!S||!S.pausedAt) return;
  S.startTime = Date.now();
  S.pausedAt = null;
  syncPausedState();
}
function toggleClock(){
  if(!S) return;
  if(S.pausedAt) resumeClock();
  else pauseClock();
  renderMenuButton();
}
function updateClockActionLabel(){
  const el=document.getElementById('clockActionLabel');
  if(el) el.textContent=isClockPaused()?'继续计时':'暂停计时';
}

// 涟漪效果：pointerdown 时在触点位置生成扩散圆
(function initRipples() {
  ['panelA','panelB'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('pointerdown', e => {
      const rect = el.getBoundingClientRect();
      const r = document.createElement('span');
      r.className = 'score-ripple';
      r.style.left = (e.clientX - rect.left) + 'px';
      r.style.top  = (e.clientY - rect.top)  + 'px';
      el.appendChild(r);
      r.addEventListener('animationend', () => r.remove(), { once: true });
    });
  });
})();

// ══════════════════════════════════════════
// 胜利 & 存档
// ══════════════════════════════════════════
function showWin(){
  const w=S.winner;
  const style = getComputedStyle(document.documentElement);
  document.getElementById('overlay').style.background = w===0
    ? style.getPropertyValue('--win-a').trim()
    : style.getPropertyValue('--win-b').trim();
  document.getElementById('winName').textContent=CFG.names[w];
  let d='';
  if(CFG.sport==='tennis')d=S.setLog.map(([a,b])=>w?`${b}-${a}`:`${a}-${b}`).join('   ');
  else if(CFG.sport!=='basketball')d=`${S.sets[0]}  ·  ${S.sets[1]}`;
  document.getElementById('winScore').textContent=d;
  document.getElementById('overlay').hidden=false;
  saveMatch();
}

function ensureBasketballSetData(){
  if(!S || CFG.sport!=='basketball') return;
  const evs=S.events||[];
  const grouped=new Map();
  evs.forEach(ev=>{
    const idx=ev.setIndex||1;
    if(!grouped.has(idx)) grouped.set(idx, []);
    grouped.get(idx).push(ev);
  });
  const indexes=[...grouped.keys()].sort((a,b)=>a-b);
  let prevA=0, prevB=0;
  S.setScores=indexes.map(idx=>{
    const last=grouped.get(idx)[grouped.get(idx).length-1];
    const score=[last.cumA-prevA, last.cumB-prevB];
    prevA=last.cumA;
    prevB=last.cumB;
    return score;
  });
  if(!S.setTimes || !S.setTimes.length) S.setTimes=[S.startTime];
  while(S.setTimes.length < indexes.length + 1){
    S.setTimes.push(Date.now());
  }
}

function finalizeCurrentMatch(winner){
  if(!S || S.winner!==null) return;
  S.winner=winner;
  if(CFG.sport==='basketball') ensureBasketballSetData();
  render();
}

function saveMatch(){
  if(!S||S.winner===null||S._saved)return;
  if(CFG.sport==='basketball') ensureBasketballSetData();
  const record={
    id:   Date.now(),
    date: Date.now(),
    sport: CFG.sport,
    names: [...CFG.names],
    rules: { ptWin:CFG.ptWin, setWin:CFG.setWin, totalSets:CFG.totalSets },
    events: S.events,
    // 篮球没有 S.sets（用 S.score），避免 [...undefined] 报错
    sets:  CFG.sport==='tennis'?(S.setLog||[]):(S.sets?[...S.sets]:[]),
    setScores: S.setScores || [],
    setTimes: S.setTimes||[],
    winner: S.winner,
    duration: getElapsedMs(),
  };
  try{
    const all=JSON.parse(localStorage.getItem('sb_history')||'[]');
    all.unshift(record);
    if(all.length>100)all.length=100;
    localStorage.setItem('sb_history',JSON.stringify(all));
    S._saved=true; // 移到存档成功后再标记，防止报错时锁死
  }catch(e){}
}

// ══════════════════════════════════════════
function toggleMenu(){document.getElementById('menuSheet').classList.contains('open')?closeMenu():openMenu();}
function openMenu(){document.getElementById('menuSheet').classList.add('open');document.getElementById('menuBackdrop').classList.add('open');updateClockActionLabel();}
function closeMenu(){document.getElementById('menuSheet').classList.remove('open');document.getElementById('menuBackdrop').classList.remove('open');}
function menuToggleClock(){closeMenu();toggleClock();}
function menuSwapSides(){closeMenu();clearPendingScore(false);if(!S)return;H.push(clone(S));S.sidesSwapped=!S.sidesSwapped;render();}
function menuFinish(){
  closeMenu();
  clearPendingScore(false);
  if(!S||S.winner!==null) return;
  const a=CFG.sport==='basketball'?S.score[0]:getCumScore()[0];
  const b=CFG.sport==='basketball'?S.score[1]:getCumScore()[1];
  if(a===b){
    alert('当前平分，不能直接结束比赛。请继续比赛或进入下一节/加时。');
    return;
  }
  finalizeCurrentMatch(a>b ? 0 : 1);
}

const SPORT_LABELS={badminton:'羽毛球',tabletennis:'乒乓球',tennis:'网球',basketball:'篮球'};

function getMatchDisplayScores(r){
  const setScores = Array.isArray(r.sets?.[0]) ? r.sets : (r.setScores || []);
  if(r.sport==='basketball'){
    const finalA = r.events?.length ? (r.events[r.events.length-1].cumA || 0) : (setScores.length ? setScores[setScores.length-1][0] : 0);
    const finalB = r.events?.length ? (r.events[r.events.length-1].cumB || 0) : (setScores.length ? setScores[setScores.length-1][1] : 0);
    const detail = setScores.length
      ? setScores.map((sc,idx)=>`第${idx+1}节 ${sc[0]}-${sc[1]}`).join(' · ')
      : '';
    return { major:`${finalA} : ${finalB}`, detail };
  }
  const majorFromSets = setScores.length
    ? setScores.reduce((acc,[a,b])=>{
        if(a>b) acc[0]++; else if(b>a) acc[1]++;
        return acc;
      }, [0,0])
    : Array.isArray(r.sets) ? r.sets : [0,0];
  return {
    major: `${majorFromSets[0]} : ${majorFromSets[1]}`,
    detail: setScores.map(([a,b])=>`${a}-${b}`).join(' · ')
  };
}

function getMatchupData(all, key){
  const matches=(all||[])
    .filter(r=>[...r.names].sort().join('\x00')===key)
    .sort((a,b)=>b.date-a.date);
  if(!matches.length) return null;
  const pairNames=key.split('\x00');
  const [n0,n1]=pairNames;
  const wins={[n0]:0,[n1]:0};
  let totalDur=0;
  const sportMap={};
  matches.forEach(r=>{
    const winner=r.names[r.winner];
    if(wins[winner]!==undefined) wins[winner]++;
    totalDur+=r.duration||0;
    sportMap[r.sport]=(sportMap[r.sport]||0)+1;
  });
  return {
    key,
    pairNames,
    matches,
    wins,
    avgDur: matches.length ? totalDur/matches.length : 0,
    sportStr: Object.entries(sportMap).sort((a,b)=>b[1]-a[1])
      .map(([s,c])=>`${SPORT_LABELS[s]||s}${c>1?'×'+c:''}`).join(' / ')
  };
}

function buildMatchupView(all){
  const pairMap=new Map();
  all.forEach(r=>{
    const key=[...r.names].sort().join('\x00');
    if(!pairMap.has(key))pairMap.set(key,[]);
    pairMap.get(key).push(r);
  });
  if(!pairMap.size) return '';
  const pairs=[...pairMap.entries()].sort((a,b)=>b[1][0].date-a[1][0].date);
  return pairs.map(([key,matches])=>{
    const data=getMatchupData(all,key);
    if(!data) return '';
    const {pairNames,wins,avgDur,sportStr}=data;
    const n=matches.length;
    const [n0,n1]=pairNames;
    const recentRows=matches.slice(0,4).map(r=>{
      const d=new Date(r.date);
      const ds=`${d.getMonth()+1}/${d.getDate()}`;
      const sc=getMatchDisplayScores(r).major;
      const wname=r.names[r.winner];

      return `<div class="matchup-row">
        <span class="matchup-row-date">${ds}</span>
        <span class="matchup-row-score">${sc}</span>
        <span class="matchup-row-winner" style="color:${wcolor}">${wname}胜</span>
      </div>`;
    }).join('');
    return `<div class="matchup-card matchup-card-click" onclick="openMatchupDetail('${encodeURIComponent(key)}')">
      <div class="matchup-head">
        <span class="matchup-name">${n0}</span>
        <span class="matchup-vs">VS</span>
        <span class="matchup-name" style="text-align:right">${n1}</span>
      </div>
      <div class="matchup-record">
        <span class="matchup-wins-a">${wins[n0]}胜</span>
        <span class="matchup-total">${n}场 · ${fmtDuration(avgDur)}</span>
        <span class="matchup-wins-b">${wins[n1]}胜</span>
      </div>
      <div class="matchup-meta">${sportStr}</div>
      <div class="matchup-log">${recentRows}</div>
      <div class="matchup-open-hint">查看这组对阵的全部 ${n} 场</div>
    </div>`;
  }).join('');
}

// ── 比分走势图 ──
function buildChartFromEvents(evs){
  if(!evs||evs.length<2)return '';
  const isDark = colorMode !== 'light';
  const axisClr  = isDark ? 'rgba(255,255,255,.22)' : 'rgba(0,0,0,.38)';
  const midClr   = isDark ? 'rgba(255,255,255,.18)' : 'rgba(0,0,0,.30)';
  const gridClr  = isDark ? 'rgba(255,255,255,.12)' : 'rgba(0,0,0,.12)';
  const yAxisClr = isDark ? 'rgba(255,255,255,.08)' : 'rgba(0,0,0,.08)';
  const lineClr  = isDark ? 'rgba(255,255,255,.7)'  : 'rgba(0,0,0,.55)';
  const W=360,H=92;
  const pad={ top:10, right:8, bottom:18, left:52 };
  const innerW=W-pad.left-pad.right;
  const innerH=H-pad.top-pad.bottom;
  const baseA=evs[0].cumA-(evs[0].delta && evs[0].p===0 ? evs[0].delta : 0);
  const baseB=evs[0].cumB-(evs[0].delta && evs[0].p===1 ? evs[0].delta : 0);
  const diffs=[0,...evs.map(e=>(e.cumA-baseA)-(e.cumB-baseB))];
  const rawAbs=Math.max(0,...diffs.map(Math.abs));
  if(rawAbs===0)return ''; // 整局双方同步得分或全 0，无走势可画
  const maxAbs=Math.max(1,rawAbs);
  const mid=pad.top + innerH/2;
  const pts=diffs.map((d,i)=>({
    x:+(pad.left + (i/(diffs.length-1))*innerW).toFixed(1),
    y:+(mid-(d/maxAbs)*(innerH/2-6)).toFixed(1)
  }));

  // 路径
  const pathD=pts.map((p,i)=>`${i===0?'M':'L'}${p.x} ${p.y}`).join(' ');

  // 填充区域（正区：A色，负区：B色）
  const areaA=`M${pts[0].x} ${mid} `+pts.map(p=>`L${p.x} ${Math.min(p.y,mid)}`).join(' ')+` L${pts[pts.length-1].x} ${mid} Z`;
  const areaB=`M${pts[0].x} ${mid} `+pts.map(p=>`L${p.x} ${Math.max(p.y,mid)}`).join(' ')+` L${pts[pts.length-1].x} ${mid} Z`;
  const startLabel='第1分';
  const endLabel=`第${evs.length}分`;
  const topLabel=`领先 ${maxAbs}`;
  const bottomLabel=`落后 ${maxAbs}`;

  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:auto;display:block;overflow:visible">
    <defs>
      <linearGradient id="ga" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#D95F4B" stop-opacity=".4"/><stop offset="1" stop-color="#D95F4B" stop-opacity=".05"/></linearGradient>
      <linearGradient id="gb" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="#4A7FA8" stop-opacity=".4"/><stop offset="1" stop-color="#4A7FA8" stop-opacity=".05"/></linearGradient>
    </defs>
    <path d="${areaA}" fill="url(#ga)"/>
    <path d="${areaB}" fill="url(#gb)"/>
    <line x1="${pad.left}" y1="${mid}" x2="${W-pad.right}" y2="${mid}" stroke="${gridClr}" stroke-width="1"/>
    <line x1="${pad.left}" y1="${pad.top}" x2="${pad.left}" y2="${H-pad.bottom}" stroke="${yAxisClr}" stroke-width="1"/>
    <path d="${pathD}" fill="none" stroke="${lineClr}" stroke-width="1.5" stroke-linejoin="round"/>
    <text x="${pad.left-6}" y="${pad.top+4}" fill="${axisClr}" font-size="9" text-anchor="end">${topLabel}</text>
    <text x="${pad.left-6}" y="${mid+3}" fill="${midClr}" font-size="9" text-anchor="end">持平</text>
    <text x="${pad.left-6}" y="${H-pad.bottom}" fill="${axisClr}" font-size="9" text-anchor="end">${bottomLabel}</text>
    <text x="${pad.left}" y="${H-4}" fill="${axisClr}" font-size="9">${startLabel}</text>
    <text x="${W-pad.right}" y="${H-4}" fill="${axisClr}" font-size="9" text-anchor="end">${endLabel}</text>
  </svg>`;
}

// ── 分局重建 ──
function buildSetSections(r){
  const grouped=new Map();
  (r.events||[]).forEach(ev=>{
    const idx=ev.setIndex || 1;
    if(!grouped.has(idx)) grouped.set(idx, []);
    grouped.get(idx).push(ev);
  });
  const savedScores = Array.isArray(r.sets?.[0]) ? r.sets : (r.setScores || []);
  const indexes = grouped.size
    ? [...grouped.keys()].sort((a,b)=>a-b)
    : (savedScores.length ? savedScores.map((_, i)=>i+1) : [1]);
  return indexes.map((idx, i)=>{
    const events=grouped.get(idx) || [];
    let score=savedScores[i];
    if(!score){
      if(events.length){
        const baseA=events[0].cumA-((events[0].p===0 ? events[0].delta : 0) || 0);
        const baseB=events[0].cumB-((events[0].p===1 ? events[0].delta : 0) || 0);
        score=[events[events.length-1].cumA-baseA, events[events.length-1].cumB-baseB];
      } else {
        score=[0,0];
      }
    }
    const duration=r.setTimes&&r.setTimes.length>i+1?fmtDuration(r.setTimes[i+1]-r.setTimes[i]):'';
    return {
      index: idx,
      label: r.sport==='basketball' ? `第 ${idx} 节` : `第 ${idx} 局`,
      score,
      duration,
      events,
    };
  });
}

// ── 连续得分段落 ──
function getStreaks(events,names){
  if(!events||!events.length)return [];
  const runs=[]; let cur={p:events[0].p,count:1,elapsedMs:(events[0].elapsedMs ?? 0)};
  for(let i=1;i<events.length;i++){
    if(events[i].p===cur.p) cur.count++;
    else{
      if(cur.count>=3)runs.push({name:names[cur.p],count:cur.count,timeLabel:fmtMatchMinute(cur.elapsedMs)});
      cur={p:events[i].p,count:1,elapsedMs:(events[i].elapsedMs ?? 0)};
    }
  }
  if(cur.count>=3)runs.push({name:names[cur.p],count:cur.count,timeLabel:fmtMatchMinute(cur.elapsedMs)});
  return runs.sort((a,b)=>b.count-a.count).slice(0,5);
}
function buildSetRuleSummary(r, section){
  if(r.sport==='basketball') return `本节为累计得分制，无固定赢分上限。`;
  if(r.sport==='tennis') return `本盘按网球局分累计，先赢 6 局且至少领先 2 局，6:6 进入抢七。`;
  const rules=r.rules||{};
  const target=rules.ptWin || 0;
  const deuce=Math.max(0, target-1);
  const max=rules.ptWin && r.sport==='badminton' ? target+9 : null;
  if(r.sport==='badminton') return `本局先到 ${target} 分，${deuce} 平后需领先 2 分，最高 ${max} 分封顶。`;
  if(r.sport==='tabletennis') return `本局先到 ${target} 分，${deuce} 平后需领先 2 分获胜。`;
  return `${section.label} 采用当前比赛默认规则。`;
}

// ── 逐分记录（合并连续）──
function buildLogFromEvents(evs,names){
  if(!evs||!evs.length)return '<div style="padding:14px;color:rgba(255,255,255,.3);font-size:14px">无记录</div>';
  // 合并连续得分
  const runs=[];
  let cur={p:evs[0].p,count:1,totalDelta:(evs[0].delta ?? 1),endCumA:evs[0].cumA,endCumB:evs[0].cumB,pointMs:(evs[0].pointMs ?? 0)};
  for(let i=1;i<evs.length;i++){
    if(evs[i].p===cur.p){
      cur.count++;
      cur.totalDelta += (evs[i].delta ?? 1);
      cur.endCumA=evs[i].cumA;
      cur.endCumB=evs[i].cumB;
      cur.pointMs += (evs[i].pointMs ?? 0);
    }
    else{
      runs.push({...cur});
      cur={p:evs[i].p,count:1,totalDelta:(evs[i].delta ?? 1),endCumA:evs[i].cumA,endCumB:evs[i].cumB,pointMs:(evs[i].pointMs ?? 0)};
    }
  }
  runs.push(cur);

  return runs.map(run=>{
    const pts=run.totalDelta===1?'得 1 分':`连得 ${run.totalDelta} 分`;
    const score=`${run.endCumA} — ${run.endCumB}`;
    const color=run.p===0?'#E07060':'#6090B8';
    const pointTime=fmtPointTime(run.pointMs);
    return `<div class="log-run">
      <span class="log-who" style="color:${color}">${names[run.p]}</span>
      <span class="log-pts">${pts}</span>
      <span class="log-meta">
        <span class="log-point-time">${pointTime}</span>
        <span class="log-score">${score}</span>
      </span>
    </div>`;
  }).join('');
}

// ── 时间格式化 ──
function fmtDuration(ms){
  if(!ms||ms<1000)return '';
  const s=Math.floor(ms/1000); const m=Math.floor(s/60); const h=Math.floor(m/60);
  if(h>0) return `${h}h ${m%60}m`;
  if(m>0) return `${m} 分钟`;
  return `${s} 秒`;
}
function fmtPointTime(ms){
  if(ms==null) return '';
  const totalSec=Math.max(0,Math.floor(ms/1000));
  const mm=String(Math.floor(totalSec/60)).padStart(2,'0');
  const ss=String(totalSec%60).padStart(2,'0');
  return `用时 ${mm}:${ss}`;
}
function fmtMatchMinute(ms){
  const totalSec=Math.max(0,Math.floor((ms||0)/1000));
  const m=Math.floor(totalSec/60);
  const s=totalSec%60;
  if(m<=0) return `比赛第 ${Math.max(1,s)} 秒`;
  return `比赛第 ${m} 分 ${String(s).padStart(2,'0')} 秒`;
}

function buildHistorySummary(all){
  if(!all.length)return '';
  const total=all.length;

  const totalPts=all.reduce((s,r)=>s+(r.events?r.events.length:0),0);
  const sportMap={};

  const topSport=Object.entries(sportMap).sort((a,b)=>b[1]-a[1])[0];

function buildOverview(all){

  // 最常运动

  const playerRank=Object.entries(playerMap).sort((a,b)=>b[1]-a[1]);
  // 最活跃对阵
  const pairMap={};
  all.forEach(r=>{const k=[...r.names].sort().join(' vs ');pairMap[k]=(pairMap[k]||0)+1;});

  const fmtMs=ms=>{
    const h=Math.floor(ms/3600000);

        <div class="ov-big-val">${totalMs>0?fmtMs(totalMs):'—'}</div>

      </div>
      <div class="ov-big-cell">
        <div class="ov-big-val">${avgMs>0?fmtMs(avgMs):'—'}</div>
        <div class="ov-big-lbl">场均时长</div>

      <div class="ov-big-cell">

  // 运动分布条

      <span class="ov-row-lbl">${SPORT_LABELS[s]||s}</span>

// ══════════════════════════════════════════
// 全场双线走势图
// ══════════════════════════════════════════
function buildProgressionChart(r,setSections){
  const isDark2 = colorMode !== 'light';
  const p_axisClr = isDark2 ? 'rgba(255,255,255,.2)'  : 'rgba(0,0,0,.32)';
  const p_gridClr = isDark2 ? 'rgba(255,255,255,.08)' : 'rgba(0,0,0,.08)';
  const p_boundClr= isDark2 ? 'rgba(255,255,255,.2)'  : 'rgba(0,0,0,.2)';
  const evs=r.events||[];
  if(evs.length<3)return '';
  const W=360,H=110;
  const pad={top:14,right:18,bottom:22,left:20};
  const iW=W-pad.left-pad.right,iH=H-pad.top-pad.bottom;
  const ptsA=[0,...evs.map(e=>e.cumA)];
  const ptsB=[0,...evs.map(e=>e.cumB)];
  const rawMax=Math.max(0,...ptsA,...ptsB);
  if(rawMax===0)return ''; // 全场 0-0，无分可画
  const maxScore=Math.max(1,rawMax);
  const n=ptsA.length;
  const xOf=i=>(pad.left+(i/(n-1))*iW).toFixed(1);
  const yOf=v=>(pad.top+iH*(1-v/maxScore)).toFixed(1);
  const pathA=ptsA.map((v,i)=>`${i===0?'M':'L'}${xOf(i)} ${yOf(v)}`).join(' ');
  const pathB=ptsB.map((v,i)=>`${i===0?'M':'L'}${xOf(i)} ${yOf(v)}`).join(' ');
  const base=(H-pad.bottom).toFixed(1);
  const fillA=`M${xOf(0)} ${base} `+ptsA.map((v,i)=>`L${xOf(i)} ${yOf(v)}`).join(' ')+` L${xOf(n-1)} ${base} Z`;
  const fillB=`M${xOf(0)} ${base} `+ptsB.map((v,i)=>`L${xOf(i)} ${yOf(v)}`).join(' ')+` L${xOf(n-1)} ${base} Z`;
  // 分局分界线
  const setBounds=[];let prevSet=evs[0]?.setIndex||1;
  evs.forEach((ev,i)=>{if(ev.setIndex!==prevSet){setBounds.push(i+1);prevSet=ev.setIndex;}});
  const boundLines=setBounds.map(i=>{
    const x=xOf(i);
    return `<line x1="${x}" y1="${pad.top}" x2="${x}" y2="${H-pad.bottom}" stroke="${p_boundClr}" stroke-width="1" stroke-dasharray="3,3"/>`;
  }).join('');
  // 末尾分数标签
  const fA=ptsA[n-1],fB=ptsB[n-1];
  const yFA=parseFloat(yOf(fA)),yFB=parseFloat(yOf(fB));
  const labAY=(Math.abs(yFA-yFB)<11?yFA-5:yFA+4).toFixed(1);
  const labBY=(Math.abs(yFA-yFB)<11?yFB+10:yFB+4).toFixed(1);
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:auto;display:block;overflow:visible">
    <path d="${fillA}" class="prog-fill-a"/>
    <path d="${fillB}" class="prog-fill-b"/>
    ${boundLines}
    <line x1="${pad.left}" y1="${H-pad.bottom}" x2="${W-pad.right}" y2="${H-pad.bottom}" stroke="${p_gridClr}" stroke-width="1"/>
    <path d="${pathA}" fill="none" stroke-width="2" stroke-linejoin="round" class="prog-line-a"/>
    <path d="${pathB}" fill="none" stroke-width="2" stroke-linejoin="round" class="prog-line-b"/>
    <text x="${pad.left}" y="${H-6}" fill="${p_axisClr}" font-size="9">开始</text>
    <text x="${(W-pad.right-2).toFixed(1)}" y="${H-6}" fill="${p_axisClr}" font-size="9" text-anchor="end">结束</text>
    <text x="${(W-pad.right+3)}" y="${labAY}" fill="#D95F4B" font-size="9" opacity=".9">${fA}</text>
    <text x="${(W-pad.right+3)}" y="${labBY}" fill="#4A7FA8" font-size="9" opacity=".9">${fB}</text>
  </svg>`;
}

// ══════════════════════════════════════════
// 分段得分
// ══════════════════════════════════════════
function buildPhaseSection(r,setSections){
  const sepClr=colorMode==='light'?'rgba(0,0,0,.3)':'rgba(255,255,255,.3)';
  const units=setSections.filter(s=>s.events.length>=3);
  if(!units.length)return '';
  const labels=['开局','中段','收尾'];
  let inner='';
  units.forEach(section=>{
    const evs=section.events;
    const third=Math.ceil(evs.length/3);
    const segs=[evs.slice(0,third),evs.slice(third,third*2),evs.slice(third*2)];
    if(units.length>1)inner+=`<div class="phase-set-title">${section.label}</div>`;
    segs.forEach((seg,i)=>{
      const a=seg.filter(e=>e.p===0).reduce((s,e)=>s+(e.delta||1),0);
      const b=seg.filter(e=>e.p===1).reduce((s,e)=>s+(e.delta||1),0);
      const tot=a+b;if(!tot)return;
      const pA=Math.round((a/tot)*100);
      inner+=`<div class="phase-row">
        <span class="phase-lbl">${labels[i]}</span>
        <div class="phase-bar-outer">
          <div style="width:${pA}%;height:100%;background:var(--clr-a,#D95F4B)"></div>
          <div style="width:${100-pA}%;height:100%;background:var(--clr-b,#4A7FA8)"></div>
        </div>
        <span class="phase-score"><span class="sa">${a}</span><span style="color:${sepClr}"> : </span><span class="sb">${b}</span></span>
      </div>`;
    });
  });
  if(!inner)return '';
  return `<div class="d-section"><div class="d-section-title">分段得分</div><div class="d-card" style="padding:10px 16px">${inner}</div></div>`;
}

// ══════════════════════════════════════════
// 关键球分析
// ══════════════════════════════════════════
function buildCriticalSection(r,names){
  const sepClr=colorMode==='light'?'rgba(0,0,0,.3)':'rgba(255,255,255,.3)';
  const evs=r.events||[];
  if(evs.length<5)return '';
  const cats=[{lbl:'领先时',a:0,b:0},{lbl:'平分时',a:0,b:0},{lbl:'落后时',a:0,b:0}];
  evs.forEach(ev=>{
    const beforeA=ev.cumA-(ev.p===0?(ev.delta||1):0);
    const beforeB=ev.cumB-(ev.p===1?(ev.delta||1):0);
    let idx;
    if(ev.p===0)idx=beforeA>beforeB?0:beforeA===beforeB?1:2;
    else        idx=beforeB>beforeA?0:beforeA===beforeB?1:2;
    cats[idx][ev.p===0?'a':'b']++;
  });
  let leadChanges=0,prevLeader=-1;
  evs.forEach(ev=>{
    const ldr=ev.cumA>ev.cumB?0:ev.cumA<ev.cumB?1:-1;
    if(prevLeader!==-1&&ldr!==-1&&ldr!==prevLeader)leadChanges++;
    prevLeader=ldr;
  });
  let maxDeficit=0;
  if(r.winner!=null){
    evs.forEach(ev=>{
      const wS=r.winner===0?ev.cumA:ev.cumB,lS=r.winner===0?ev.cumB:ev.cumA;
      if(lS-wS>maxDeficit)maxDeficit=lS-wS;
    });
  }
  const rows=cats.map(cat=>{
    const tot=cat.a+cat.b;if(!tot)return '';
    const pA=Math.round((cat.a/tot)*100);
    return `<div class="crit-row">
      <span class="crit-lbl">${cat.lbl}</span>
      <div class="crit-bar-outer">
        <div style="width:${pA}%;height:100%;background:var(--clr-a,#D95F4B)"></div>
        <div style="width:${100-pA}%;height:100%;background:var(--clr-b,#4A7FA8)"></div>
      </div>
      <span class="crit-score"><span class="sa">${cat.a}</span><span style="color:${sepClr}"> : </span><span class="sb">${cat.b}</span></span>
    </div>`;
  }).join('');
  const notes=[];
  if(leadChanges>0)notes.push(`领先权交换 ${leadChanges} 次`);
  if(maxDeficit>0&&r.winner!=null)notes.push(`${names[r.winner]} 曾落后 ${maxDeficit} 分后逆转`);
  else if(maxDeficit===0&&r.winner!=null)notes.push(`${names[r.winner]} 全程保持领先`);
  return `<div class="d-section"><div class="d-section-title">关键球</div><div class="d-card" style="padding:10px 16px">
    ${rows}
    ${notes.length?`<div class="crit-summary">${notes.join('　')}</div>`:''}
  </div></div>`;
}

// ══════════════════════════════════════════
// 节奏分析
// ══════════════════════════════════════════
function buildPaceSection(r,setSections){
  const evs=r.events||[];
  const allMs=evs.map(e=>e.pointMs||0).filter(ms=>ms>200&&ms<600000);
  if(allMs.length<3)return '';
  const avg=Math.round(allMs.reduce((a,b)=>a+b,0)/allMs.length);
  const maxMs=Math.max(...allMs);
  const fmtSec=ms=>{
    if(!ms)return '—';
    if(ms<60000)return `${(ms/1000).toFixed(1)}秒`;
    const m=Math.floor(ms/60000),ss=((ms%60000)/1000).toFixed(0);
    return `${m}分${ss}秒`;
  };
  const setPaces=setSections.map(s=>{
    const ms=s.events.map(e=>e.pointMs||0).filter(x=>x>200&&x<600000);
    return ms.length>=2?{label:s.label,avg:Math.round(ms.reduce((a,b)=>a+b,0)/ms.length)}:null;
  }).filter(Boolean);
  let setPaceHtml='';
  if(setPaces.length>1){
    const maxAvg=Math.max(...setPaces.map(p=>p.avg));
    setPaceHtml=`<div class="pace-set-bars">`+setPaces.map(p=>{
      const pct=Math.round((p.avg/maxAvg)*100);
      return `<div class="pace-set-row">
        <span class="pace-set-lbl">${p.label}</span>
        <div class="pace-set-bar-outer"><div class="pace-set-bar-inner" style="width:${pct}%"></div></div>
        <span class="pace-set-val">${fmtSec(p.avg)}</span>
      </div>`;
    }).join('')+`</div>`;
  }
  return `<div class="d-section"><div class="d-section-title">比赛节奏</div><div class="d-card" style="padding:14px 16px">
    <div class="pace-grid">
      <div><div class="pace-stat-val">${fmtSec(avg)}</div><div class="pace-stat-lbl">场均每分用时</div></div>
      <div><div class="pace-stat-val">${fmtSec(maxMs)}</div><div class="pace-stat-lbl">最长间隔</div></div>
    </div>
    ${setPaceHtml}
  </div></div>`;
}

// 滑动删除（Android）
// ══════════════════════════════════════════
function initSwipeDelete(){
  const list=document.getElementById('historyList');
  if(!list)return;
  const SNAP=84;
  let startX=0,startY=0,activeItem=null,initTx=0,dragging=false;

  // 读取卡片当前的 translateX
  function getTx(item){
    const track=item.querySelector('.h-swipe-track');
    if(!track)return 0;
    const m=(track.style.transform||'').match(/translateX\((-?[\d.]+)px\)/);
    return m?parseFloat(m[1]):0;
  }
  // 整条轨道一起平移：左边是卡片，右边是删除键。
  function applyTx(item,x,animate){
    const track=item.querySelector('.h-swipe-track');
    if(!track) return;
    track.style.transition=animate?'transform .22s cubic-bezier(.3,.8,.6,1)':'none';
    track.style.transform=x===0?'none':`translateX(${x}px)`;
  }
  function closeAll(except){
    list.querySelectorAll('.h-swipe-item').forEach(item=>{
      if(item!==except)applyTx(item,0,true);
    });
  }

  list.addEventListener('touchstart',e=>{
    const item=e.target.closest('.h-swipe-item');
    if(!item){closeAll(null);return;}
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
    initTx=getTx(item);
    activeItem=item;
    dragging=false;
  },{passive:true});

  list.addEventListener('touchmove',e=>{
    if(!activeItem)return;
    const dx=e.touches[0].clientX-startX;
    const dy=e.touches[0].clientY-startY;
    if(!dragging){
      if(Math.abs(dy)>Math.abs(dx)+6){activeItem=null;return;}
      if(Math.abs(dx)>6)dragging=true; else return;
    }
    e.preventDefault();
    applyTx(activeItem,Math.max(-SNAP*1.1,Math.min(0,initTx+dx)),false);
  },{passive:false});

  list.addEventListener('touchend',e=>{
    if(!activeItem)return;
    const finalX=initTx+(e.changedTouches[0].clientX-startX);
    if(finalX<-SNAP*0.4){applyTx(activeItem,-SNAP,true);closeAll(activeItem);}
    else applyTx(activeItem,0,true);
    activeItem=null;dragging=false;
  },{passive:true});
}

// ══════════════════════════════════════════
function exportHistory(){
  let all=[];
  try{all=JSON.parse(localStorage.getItem('sb_history')||'[]');}catch(e){}
  if(!all.length){alert('暂无历史记录可导出');return;}

  const sportZh={badminton:'羽毛球',tabletennis:'乒乓球',tennis:'网球',basketball:'篮球'};
  const fmt=ms=>{if(!ms||ms<1000)return '';const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);return h?`${h}小时${m%60}分`:`${m?m+'分':''}${s%60}秒`;};
  const iso=ts=>ts?new Date(ts).toISOString():'';

  const matches=all.map(r=>{
    const evs=r.events||[];
    // 设置详情
    const setSections=[];
    const grouped={};
    evs.forEach(ev=>{const k=ev.setIndex||1;(grouped[k]||(grouped[k]=[])).push(ev);});
    Object.keys(grouped).sort((a,b)=>a-b).forEach((k,i)=>{
      const sevs=grouped[k];
      const sc=(r.setScores||r.sets||[])[i]||[sevs[sevs.length-1]?.cumA||0,sevs[sevs.length-1]?.cumB||0];
      const dur=r.setTimes&&r.setTimes.length>i+1?Math.round((r.setTimes[i+1]-r.setTimes[i])/1000):null;
      setSections.push({
        set_no: parseInt(k),
        label: r.sport==='basketball'?`第${k}节`:`第${k}局`,
        score_a: Array.isArray(sc)?sc[0]:sc,
        score_b: Array.isArray(sc)?sc[1]:0,
        duration_sec: dur,
      });
    });
    // 连续最长
    let maxStreakA=0,maxStreakB=0,curP=-1,cur=0;
    evs.forEach(ev=>{
      if(ev.p===curP)cur++;else{cur=1;curP=ev.p;}
      if(curP===0&&cur>maxStreakA)maxStreakA=cur;
      if(curP===1&&cur>maxStreakB)maxStreakB=cur;
    });
    // 换手
    let leadChanges=0,prevL=-1;
    evs.forEach(ev=>{const l=ev.cumA>ev.cumB?0:ev.cumA<ev.cumB?1:-1;if(prevL!==-1&&l!==-1&&l!==prevL)leadChanges++;prevL=l;});
    // 点均用时
    const pMs=evs.map(e=>e.pointMs||0).filter(x=>x>200&&x<600000);
    const avgPt=pMs.length?Math.round(pMs.reduce((a,b)=>a+b,0)/pMs.length):null;

    return {
      id: r.id,
      date_iso: iso(r.date),
      sport: r.sport,
      sport_zh: sportZh[r.sport]||r.sport,
      player_a: r.names[0],
      player_b: r.names[1],
      winner: r.winner,
      winner_name: r.names[r.winner],
      duration_sec: r.duration?Math.round(r.duration/1000):null,
      duration_label: fmt(r.duration),
      rules: r.rules||{},
      sets: setSections,
      events: evs.map((ev,i)=>({
        no: i+1,
        scorer: r.names[ev.p],
        scorer_side: ev.p===0?'A':'B',
        set_no: ev.setIndex||1,
        score_a: ev.cumA,
        score_b: ev.cumB,
        elapsed_sec: ev.elapsedMs?Math.round(ev.elapsedMs/1000):null,
        point_duration_sec: ev.pointMs?Math.round(ev.pointMs/1000):null,
      })),
      summary: {
        total_points: evs.length,
        lead_changes: leadChanges,
        max_streak_a: maxStreakA,
        max_streak_b: maxStreakB,
        avg_point_duration_sec: avgPt,
      },
    };
  });

  const payload={
    export_app:'记分器',
    export_version:'1.2.13',
    export_time: new Date().toISOString(),
    record_count: matches.length,
    matches,
  };

  const json=JSON.stringify(payload,null,2);
  const dateStr=new Date().toISOString().slice(0,10);
  const filename=`scoreboard_${dateStr}.json`;

  // Android：优先用原生桥接写入 Downloads 文件夹，降级为复制到剪贴板
  if(typeof APP_PLATFORM!=='undefined' && APP_PLATFORM==='android'){
    if(window.ScoreboardBridge){
      const shareResult = window.ScoreboardBridge.shareFile
        ? window.ScoreboardBridge.shareFile(filename,json)
        : 'unsupported';
      if(shareResult==='ok'){
        const toast=document.createElement('div');
        toast.style.cssText='position:fixed;bottom:calc(var(--safe-bottom,0px)+24px);left:50%;transform:translateX(-50%);'
          +'background:rgba(20,20,20,.92);color:#fff;font-size:14px;font-weight:700;padding:12px 22px;'
          +'border-radius:50px;z-index:9999;white-space:nowrap;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.35);';
        toast.textContent='已打开系统分享面板';
        document.body.appendChild(toast);
        setTimeout(()=>toast.remove(),2500);
        return;
      }
      const result=window.ScoreboardBridge.saveToDownloads(filename,json);
      if(result==='ok'){
        const toast=document.createElement('div');
        toast.style.cssText='position:fixed;bottom:calc(var(--safe-bottom,0px)+24px);left:50%;transform:translateX(-50%);'
          +'background:rgba(30,200,100,.92);color:#fff;font-size:14px;font-weight:700;padding:12px 22px;'
          +'border-radius:50px;z-index:9999;white-space:nowrap;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.35);';
        toast.textContent=`✓ 已保存到下载目录：${filename}`;
        document.body.appendChild(toast);
        setTimeout(()=>toast.remove(),3500);
        return;
      }
      // 写入失败时降级（不常见）
    }
    // ── 方案B：复制到剪贴板 + 弹出模态框 ──
    function showExportModal(autoCopied){
      const old=document.getElementById('exportModal');if(old)old.remove();
      const m=document.createElement('div');
      m.id='exportModal';
      m.style.cssText='position:fixed;inset:0;z-index:9900;background:rgba(0,0,0,.88);display:flex;flex-direction:column;';
      m.innerHTML=`
        <div style="flex:0 0 auto;padding:calc(var(--safe-top,0px)+18px) 20px 14px;display:flex;align-items:center;justify-content:space-between;">
          <div>
            <div style="color:#fff;font-size:17px;font-weight:700">数据导出</div>
            <div style="color:rgba(255,255,255,.45);font-size:12px;margin-top:3px">共 ${matches.length} 条记录 · ${dateStr}</div>
          </div>
          <button id="exportClose" style="background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.6);border-radius:50%;width:32px;height:32px;font-size:18px;cursor:pointer;">×</button>
        </div>
        <div id="exportTip" style="margin:0 20px 10px;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600;${autoCopied?'background:rgba(52,199,89,.2);color:#4cd964':'background:rgba(255,200,0,.15);color:rgba(255,220,80,.9)'}">
          ${autoCopied?'✓ 已复制到剪贴板，可粘贴给 AI 分析':'长按下方文本框全选后复制'}
        </div>
        <textarea id="exportText" readonly style="flex:1;margin:0 20px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.75);border:none;border-radius:12px;padding:14px;font-size:11px;font-family:monospace;line-height:1.5;resize:none;-webkit-user-select:text;user-select:text;"></textarea>
        <div style="flex:0 0 auto;padding:14px 20px;padding-bottom:calc(var(--safe-bottom,0px)+14px);">
          <button id="exportCopyBtn" style="width:100%;background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:14px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;">复制全部内容</button>
        </div>`;
      document.body.appendChild(m);
      requestAnimationFrame(()=>{const ta=document.getElementById('exportText');if(ta)ta.value=json;});
      document.getElementById('exportClose').onclick=()=>m.remove();
      document.getElementById('exportCopyBtn').onclick=function(){
        const btn=this;
        const copyDone=()=>{
          btn.textContent='✓ 已复制';
          const tip=document.getElementById('exportTip');
          if(tip){tip.style.background='rgba(52,199,89,.2)';tip.style.color='#4cd964';tip.textContent='✓ 已复制到剪贴板，可粘贴给 AI 分析';}
          setTimeout(()=>{btn.textContent='复制全部内容';},2500);
        };
        if(navigator.clipboard&&navigator.clipboard.writeText){
          navigator.clipboard.writeText(json).then(copyDone).catch(()=>{
            const ta=document.getElementById('exportText');
            if(ta){ta.select();try{document.execCommand('copy');copyDone();}catch(e){}}
          });
        } else {
          const ta=document.getElementById('exportText');
          if(ta){ta.focus();ta.select();try{document.execCommand('copy');copyDone();}catch(e){}}
        }
      };
    }
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(json).then(()=>showExportModal(true)).catch(()=>showExportModal(false));
    } else {
      showExportModal(false);
    }
    return;
  }

  // iOS：优先调用系统分享，其次下载，再不行就复制文本
  if(typeof APP_PLATFORM!=='undefined' && APP_PLATFORM==='ios'){
    if(navigator.share && window.File){
      const file = new File([json], filename, { type:'application/json' });
      try{
        const canShare = !navigator.canShare || navigator.canShare({ files:[file] });
        if(canShare){
          navigator.share({
            title:'记分器导出数据',
            text:'记分器比赛记录导出文件',
            files:[file]
          }).catch(()=>{});
          return;
        }
      }catch(e){}
    }

    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
    return;
  }

  // 桌面端：标准 blob 下载
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
}

// 导入数据（Mac/桌面端）

function importHistory(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      // 支持直接数组格式或带 matches 字段的导出格式
      let incoming=[];
      if(Array.isArray(data)) incoming=data;
      else if(Array.isArray(data.matches)){
        // 把导出格式转回内部格式（尽量还原）
        incoming=data.matches.map(m=>({
          id: m.id,
          date: new Date(m.date_iso).getTime()||m.id,
          sport: m.sport,
          names: [m.player_a,m.player_b],
          winner: m.winner,
          duration: m.duration_sec?m.duration_sec*1000:0,
          rules: m.rules||{},
          sets: (m.sets||[]).map(s=>[s.score_a,s.score_b]),
          setScores: (m.sets||[]).map(s=>[s.score_a,s.score_b]),
          setTimes: [],
          events: (m.events||[]).map(ev=>({
            p: ev.scorer_side==='A'?0:1,
            delta: 1,
            setIndex: ev.set_no||1,
            t: 0,
            elapsedMs: ev.elapsed_sec?ev.elapsed_sec*1000:0,
            pointMs: ev.point_duration_sec?ev.point_duration_sec*1000:0,
            cumA: ev.score_a,
            cumB: ev.score_b,
          })),
          _saved: true,
        }));
      }
      let existing=[];
      try{existing=JSON.parse(localStorage.getItem('sb_history')||'[]');}catch(_){}
      const existingIds=new Set(existing.map(r=>r.id));
      const toAdd=incoming.filter(r=>r.id&&!existingIds.has(r.id));
      if(!toAdd.length){alert('没有发现新记录（可能已全部导入过）');return;}
      const merged=[...toAdd,...existing].sort((a,b)=>b.date-a.date).slice(0,200);
      localStorage.setItem('sb_history',JSON.stringify(merged));
      alert(`成功导入 ${toAdd.length} 条记录`);
      if(typeof renderHistoryList==='function') renderHistoryList();
    }catch(err){
      alert('文件格式有误，请选择由本应用导出的 JSON 文件');
    }
    event.target.value='';
  };
  reader.readAsText(file);
}

// ══════════════════════════════════════════
// 演示数据种子（历史为空时注入）
// ══════════════════════════════════════════
function seedDemoHistory(){
  // 演示数据始终写到独立的 sb_demo_history，不污染真实数据

  // 简单 PRNG
  function mkRng(seed){
    let s=seed>>>0;
    return()=>{s=Math.imul(s^(s>>>16),0x45d9f3b);s=Math.imul(s^(s>>>16),0x45d9f3b);return((s>>>0)/0x100000000);};
  }

  // 生成一局的事件序列（按目标比分引导随机）
  function genSetEvs(scoreA,scoreB,setIdx,startCumA,startCumB,startElapsed,rng){
    let a=0,b=0,cumA=startCumA,cumB=startCumB,elapsed=startElapsed;
    const evs=[];
    while(a<scoreA||b<scoreB){
      const remA=scoreA-a,remB=scoreB-b;
      let p;
      if(remA<=0)p=1;else if(remB<=0)p=0;
      else{const bias=remA/(remA+remB)*0.65+0.175;p=rng()<bias?0:1;}
      const ms=Math.round(2800+rng()*16000);
      elapsed+=ms;
      if(p===0){a++;cumA++;}else{b++;cumB++;}
      evs.push({p,delta:1,setIndex:setIdx,t:0,elapsedMs:elapsed,pointMs:ms,cumA,cumB});
    }
    return{evs,elapsed};
  }

  // 生成一场完整比赛记录
  function genMatch({id,sport,names,setScores,daysAgo}){
    const rng=mkRng(id);
    const now=Date.now()-daysAgo*86400000;
    let cumA=0,cumB=0,elapsed=0;
    const allEvs=[],setTimes=[now],setScoresSaved=[];
    setScores.forEach(([sa,sb],i)=>{
      const r=genSetEvs(sa,sb,i+1,cumA,cumB,elapsed,rng);
      allEvs.push(...r.evs);
      elapsed=r.elapsed;
      setTimes.push(now+elapsed);
      setScoresSaved.push([sa,sb]);
    });
    const setWinsA=setScores.filter(([a,b])=>a>b).length;
    const setWinsB=setScores.filter(([a,b])=>b>a).length;
    const winner=setWinsA>=setWinsB?0:1; // basketball uses score
    const ptWin=sport==='tabletennis'?11:sport==='badminton'?21:null;
    return{id,date:now,sport,names,winner,duration:elapsed,
      rules:{ptWin,setWin:Math.ceil(setScores.length/2),totalSets:setScores.length},
      sets:setScoresSaved,setScores:setScoresSaved,setTimes,events:allEvs,_saved:true,_demo:true};
  }

  // 篮球场专属生成（用累计分制）
  function genBBMatch({id,names,quarterScores,daysAgo}){
    const rng=mkRng(id);
    const now=Date.now()-daysAgo*86400000;
    let elapsed=0,cumA=0,cumB=0;
    const allEvs=[],setTimes=[now];
    quarterScores.forEach(([qa,qb],qi)=>{
      // 生成这节的得分事件
      let a=0,b=0;
      while(a<qa||b<qb){
        const remA=qa-a,remB=qb-b;
        let p;if(remA<=0)p=1;else if(remB<=0)p=0;
        else{const bias=remA/(remA+remB)*0.65+0.175;p=rng()<bias?0:1;}
        const pts=rng()<0.15?3:rng()<0.2?1:2; // +1/+2/+3 随机
        const ms=Math.round(8000+rng()*20000);
        elapsed+=ms;
        if(p===0){a+=pts;cumA+=pts;}else{b+=pts;cumB+=pts;}
        // 防止超过目标
        if(p===0&&a>qa)a=qa;
        if(p===1&&b>qb)b=qb;
        if(p===0)cumA=cumA-(a-(Math.min(a,qa)));
        if(p===1)cumB=cumB-(b-(Math.min(b,qb)));
        allEvs.push({p,delta:pts,setIndex:qi+1,t:0,elapsedMs:elapsed,pointMs:ms,cumA,cumB});
      }
      setTimes.push(now+elapsed);
    });
    const finalA=cumA,finalB=cumB;
    const winner=finalA>=finalB?0:1;
    // sets字段对篮球存各节得分差
    const sets=quarterScores.map(([a,b])=>[a,b]);
    return{id,date:now,sport:'basketball',names,winner,duration:elapsed,
      rules:{ptWin:null,setWin:0,totalSets:4},
      sets,setScores:sets,setTimes,events:allEvs,_saved:true,_demo:true};
  }

  const demos=[
    genMatch({id:1748800000000,sport:'badminton',names:['张三','李四'],
      setScores:[[21,15],[21,18]],daysAgo:1}),
    genMatch({id:1748700000000,sport:'badminton',names:['张三','李四'],
      setScores:[[18,21],[21,14],[21,19]],daysAgo:3}),
    genMatch({id:1748600000000,sport:'tabletennis',names:['小明','小红'],
      setScores:[[11,7],[8,11],[11,9],[11,6]],daysAgo:5}),
    genMatch({id:1748500000000,sport:'badminton',names:['张三','李四'],
      setScores:[[15,21],[18,21]],daysAgo:7}),
    genMatch({id:1748400000000,sport:'tabletennis',names:['小明','小红'],
      setScores:[[11,8],[9,11],[7,11],[11,9],[8,11]],daysAgo:9}),
    genBBMatch({id:1748300000000,names:['雷霆队','闪电队'],
      quarterScores:[[22,18],[19,21],[25,16],[15,20]],daysAgo:11}),
    genMatch({id:1748200000000,sport:'tennis',names:['老王','老李'],
      setScores:[[6,4],[3,6],[7,5]],daysAgo:14}),

    navigator.serviceWorker.getRegistrations()
      .then(regs => Promise.all(regs.map(reg => reg.unregister())))
      .catch(() => {});

  if ('caches' in window) {
    caches.keys()
      .then(keys => Promise.all(keys.map(key => caches.delete(key))))

} else if ('serviceWorker' in navigator) {
